name: Staging Deploy

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Deploy this ref, show staging status, or rollback to an existing GHCR tag.
        type: choice
        required: true
        default: deploy
        options:
          - deploy
          - status
          - rollback
      image_tag:
        description: Existing GHCR tag for rollback. Use a git SHA tag, not "staging".
        required: false
        type: string
      accept_data_loss:
        description: Allow Prisma db push --accept-data-loss for reviewed contract cleanup deploys.
        required: false
        type: boolean
        default: false
      allow_downtime_for_space:
        description: Stop the current staging stack if image pull needs active-layer disk space.
        required: false
        type: boolean
        default: true

concurrency:
  group: staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE_BASE: ghcr.io/agentfoundry-labs/kiditem-api
  API_RUNTIME_BASE_IMAGE: ghcr.io/agentfoundry-labs/kiditem-api-base:node22-chromium-b6503cb2512e
  WEB_IMAGE_BASE: ghcr.io/agentfoundry-labs/kiditem-web

jobs:
  prepare:
    name: Prepare staging image refs
    if: inputs.operation == 'deploy'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      git_sha: ${{ steps.refs.outputs.git_sha }}
      app_version: ${{ steps.refs.outputs.app_version }}
      api_image_tag: ${{ steps.refs.outputs.api_image_tag }}
      web_image_tag: ${{ steps.refs.outputs.web_image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate staging build variables
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          : "${NEXT_PUBLIC_SUPABASE_URL:?Set repository variable NEXT_PUBLIC_SUPABASE_URL}"
          : "${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:?Set repository variable NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}"

      - name: Compute image references
        id: refs
        run: |
          set -euo pipefail
          app_version="$(tr -d '[:space:]' < VERSION)"
          case "$app_version" in
            [0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "Invalid root VERSION: $app_version" >&2
              exit 2
              ;;
          esac
          {
            echo "git_sha=${GITHUB_SHA}"
            echo "app_version=${app_version}"
            echo "api_image_tag=${API_IMAGE_BASE}:${GITHUB_SHA}"
            echo "web_image_tag=${WEB_IMAGE_BASE}:${GITHUB_SHA}"
          } >> "$GITHUB_OUTPUT"

  build_api:
    name: Build and push API image
    if: inputs.operation == 'deploy'
    needs: prepare
    uses: ./.github/workflows/build-image.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      image_base: ghcr.io/agentfoundry-labs/kiditem-api
      dockerfile: ./apps/server/Dockerfile
      cache_scope: staging-api
      title: KidItem Staging API
      app_version: ${{ needs.prepare.outputs.app_version }}
      build_args: |
        API_RUNTIME_BASE_IMAGE=ghcr.io/agentfoundry-labs/kiditem-api-base:node22-chromium-b6503cb2512e
      extra_tags: ghcr.io/agentfoundry-labs/kiditem-api:staging
      preflight_image: ghcr.io/agentfoundry-labs/kiditem-api-base:node22-chromium-b6503cb2512e

  build_web:
    name: Build and push web image
    if: inputs.operation == 'deploy'
    needs: prepare
    uses: ./.github/workflows/build-image.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      image_base: ghcr.io/agentfoundry-labs/kiditem-web
      dockerfile: ./apps/web/Dockerfile
      cache_scope: staging-web
      title: KidItem Staging Web
      app_version: ${{ needs.prepare.outputs.app_version }}
      build_args: |
        NEXT_PUBLIC_API_URL=
        NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      extra_tags: ghcr.io/agentfoundry-labs/kiditem-web:staging

  deploy:
    name: Deploy to staging
    if: inputs.operation == 'deploy'
    needs:
      - prepare
      - build_api
      - build_web
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install DB migration dependencies
        run: |
          set -euo pipefail
          npm ci --ignore-scripts \
            --fetch-timeout=600000 \
            --fetch-retries=5 \
            --fetch-retry-mintimeout=20000 \
            --fetch-retry-maxtimeout=120000 \
            --no-audit \
            --no-fund

      - name: Generate Prisma client for data migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set staging secret STAGING_DATABASE_URL}"
          npx prisma generate

      - name: Run pre-schema data migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DATA_MIGRATION_TARGET: staging
          DATA_MIGRATION_CONFIRM: APPLY_DATA_MIGRATIONS
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set staging secret STAGING_DATABASE_URL}"
          npm run data:migrate -- up --phase pre-schema

      - name: Check staging data-loss preflight
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set staging secret STAGING_DATABASE_URL}"
          echo "Checking channel_listings_org_account_external_id_key duplicate groups"
          node <<'NODE'
          const fs = require('node:fs');
          const { Client } = require('pg');

          const client = new Client({ connectionString: process.env.DATABASE_URL });

          (async () => {
            await client.connect();
            const result = await client.query(`
              WITH duplicate_groups AS (
                SELECT organization_id,
                       channel_account_id,
                       external_id,
                       count(*)::int AS row_count
                FROM channel_listings
                WHERE is_deleted = false
                  AND channel_account_id IS NOT NULL
                GROUP BY organization_id,
                         channel_account_id,
                         external_id
                HAVING count(*) > 1
              )
              SELECT count(*)::int AS duplicate_groups,
                     COALESCE(sum(row_count - 1), 0)::int AS duplicate_rows
              FROM duplicate_groups
            `);
            const row = result.rows[0] ?? { duplicate_groups: 0, duplicate_rows: 0 };
            const duplicateGroups = Number(row.duplicate_groups);
            const duplicateRows = Number(row.duplicate_rows);
            if (duplicateGroups > 0 || duplicateRows > 0) {
              throw new Error(
                `channel_listings_org_account_external_id_key is unsafe: ${duplicateGroups} duplicate group(s), ${duplicateRows} extra row(s).`,
              );
            }
            fs.appendFileSync(process.env.GITHUB_ENV, 'CHANNEL_LISTING_ACCOUNT_UNIQUE_PREFLIGHT=ok\n');
            console.log('channel_listings_org_account_external_id_key preflight passed: no duplicate groups.');
          })().finally(() => client.end()).catch((error) => {
            console.error(error instanceof Error ? error.message : String(error));
            process.exit(1);
          });
          NODE

      - name: Apply staging Prisma schema
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          ACCEPT_DATA_LOSS: ${{ inputs.accept_data_loss }}
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set staging secret STAGING_DATABASE_URL}"
          node <<'NODE'
          const raw = process.env.DATABASE_URL || '';
          let target = raw;
          try {
            const url = new URL(raw);
            target = `${url.hostname} ${url.pathname}`;
          } catch {}
          if (/\bprod(?:uction)?\b/i.test(target)) {
            console.error('DATABASE_URL host/path looks production-like');
            process.exit(2);
          }
          NODE
          db_push_log="$(mktemp)"
          if npx prisma db push 2>&1 | tee "$db_push_log"; then
            rm -f "$db_push_log"
          elif [ "${ACCEPT_DATA_LOSS}" = "true" ]; then
            echo "::warning::Running Prisma db push with --accept-data-loss for a reviewed staging contract cleanup."
            npx prisma db push --accept-data-loss
          else
            if CHANNEL_LISTING_ACCOUNT_UNIQUE_PREFLIGHT="${CHANNEL_LISTING_ACCOUNT_UNIQUE_PREFLIGHT:-}" node - "$db_push_log" <<'NODE'
          const fs = require('node:fs');
          const logPath = process.argv[2];
          const text = fs.readFileSync(logPath, 'utf8');
          const bullet = String.fromCharCode(0x2022);
          const warnings = text
            .split('\n')
            .map((line) => line.trim())
            .filter((line) => line.startsWith(bullet));
          const knownWarning = 'A unique constraint covering the columns `[organization_id,channel_account_id,external_id]` on the table `channel_listings` will be added.';
          const safeKnownWarning =
            process.env.CHANNEL_LISTING_ACCOUNT_UNIQUE_PREFLIGHT === 'ok'
            && warnings.length === 1
            && warnings[0].includes(knownWarning);
          process.exit(safeKnownWarning ? 0 : 1);
          NODE
            then
              echo "::warning::Auto-accepting reviewed staging unique constraint after duplicate preflight."
              npx prisma db push --accept-data-loss
            else
              echo "::error::Prisma db push requires reviewed data-loss handling." >&2
              exit 1
            fi
            rm -f "$db_push_log"
          fi
          npx prisma generate

      - name: Run post-schema data migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DATA_MIGRATION_TARGET: staging
          DATA_MIGRATION_CONFIRM: APPLY_DATA_MIGRATIONS
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set staging secret STAGING_DATABASE_URL}"
          npm run data:migrate -- up --phase post-schema

      - name: Render staging runtime env files
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}
          SUPABASE_URL: ${{ vars.STAGING_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          SOURCING_EXTENSION_TOKEN_SECRET: ${{ secrets.STAGING_SOURCING_EXTENSION_TOKEN_SECRET }}
          SOURCING_EXTENSION_TOKEN_TTL_SECONDS: ${{ vars.STAGING_SOURCING_EXTENSION_TOKEN_TTL_SECONDS }}
          SOURCING_EXTENSION_TOKEN_MAX_SECONDS: ${{ vars.STAGING_SOURCING_EXTENSION_TOKEN_MAX_SECONDS }}
          CORS_ORIGINS: ${{ vars.STAGING_CORS_ORIGINS || vars.STAGING_URL }}
          S3_REGION: ${{ vars.STAGING_S3_REGION }}
          S3_BUCKET: ${{ vars.STAGING_S3_BUCKET }}
          S3_ENDPOINT: ${{ vars.STAGING_S3_ENDPOINT }}
          S3_PUBLIC_URL: ${{ vars.STAGING_S3_PUBLIC_URL }}
          S3_ACCESS_KEY: ${{ secrets.STAGING_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.STAGING_S3_SECRET_KEY }}
          CHANNEL_CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.STAGING_CHANNEL_CREDENTIALS_ENCRYPTION_KEY }}
          NAVER_DATALAB_CLIENT_ID: ${{ secrets.STAGING_NAVER_DATALAB_CLIENT_ID }}
          NAVER_DATALAB_CLIENT_SECRET: ${{ secrets.STAGING_NAVER_DATALAB_CLIENT_SECRET }}
          NAVER_DATALAB_BASE_URL: ${{ vars.STAGING_NAVER_DATALAB_BASE_URL }}
          NAVER_DATALAB_WEB_BASE_URL: ${{ vars.STAGING_NAVER_DATALAB_WEB_BASE_URL }}
          NAVER_SEARCHAD_API_KEY: ${{ secrets.STAGING_NAVER_SEARCHAD_API_KEY }}
          NAVER_SEARCHAD_SECRET_KEY: ${{ secrets.STAGING_NAVER_SEARCHAD_SECRET_KEY }}
          NAVER_SEARCHAD_CUSTOMER_ID: ${{ secrets.STAGING_NAVER_SEARCHAD_CUSTOMER_ID }}
          NAVER_SEARCHAD_BASE_URL: ${{ vars.STAGING_NAVER_SEARCHAD_BASE_URL }}
          DIRECT_1688_MTOP_BASE_URL: ${{ vars.STAGING_DIRECT_1688_MTOP_BASE_URL }}
          TMAPI_TOKEN: ${{ secrets.STAGING_TMAPI_TOKEN }}
          TMAPI_BASE_URL: ${{ vars.STAGING_TMAPI_BASE_URL }}
          GEMINI_API_KEY: ${{ secrets.STAGING_GEMINI_API_KEY }}
          AI_TEXT_MODEL: ${{ vars.STAGING_AI_TEXT_MODEL }}
          AI_IMAGE_MODEL: ${{ vars.STAGING_AI_IMAGE_MODEL }}
          AI_IMAGE_ANALYSIS_MODEL: ${{ vars.STAGING_AI_IMAGE_ANALYSIS_MODEL }}
          AI_IMAGE_ANALYSIS_VERIFY_MODEL: ${{ vars.STAGING_AI_IMAGE_ANALYSIS_VERIFY_MODEL }}
          AGENT_RUNTIME_WORKER_ENABLED: ${{ vars.STAGING_AGENT_RUNTIME_WORKER_ENABLED }}
          AGENT_DEFAULT_MODEL: ${{ vars.STAGING_AGENT_DEFAULT_MODEL }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          bash deploy/staging/render-runtime-env.sh

      - name: Prepare SSH
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${STAGING_SSH_KEY:?Set staging secret STAGING_SSH_KEY}"
          : "${STAGING_SSH_KNOWN_HOSTS:?Set staging secret STAGING_SSH_KNOWN_HOSTS}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/kiditem-staging
          chmod 600 ~/.ssh/kiditem-staging
          printf '%s\n' "$STAGING_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Sync staging compose assets
        env:
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          STAGING_USER: ${{ vars.STAGING_USER }}
          STAGING_REMOTE_DIR: ${{ vars.STAGING_REMOTE_DIR }}
        run: |
          set -euo pipefail
          ./deploy/staging/remote-deploy.sh --help >/dev/null
          : "${STAGING_HOST:?Set staging variable STAGING_HOST}"
          STAGING_USER="${STAGING_USER:-ubuntu}"
          STAGING_REMOTE_DIR="${STAGING_REMOTE_DIR:-/opt/kiditem}"
          case "$STAGING_USER" in (*[!A-Za-z0-9_.-]*|'') echo "Invalid STAGING_USER" >&2; exit 2 ;; esac
          case "$STAGING_REMOTE_DIR" in (/*) ;; (*) echo "STAGING_REMOTE_DIR must be absolute" >&2; exit 2 ;; esac
          case "$STAGING_REMOTE_DIR" in (*[!A-Za-z0-9_./-]*) echo "Invalid STAGING_REMOTE_DIR" >&2; exit 2 ;; esac
          target="${STAGING_USER}@${STAGING_HOST}"
          remote_dir_q="$(printf '%q' "$STAGING_REMOTE_DIR")"
          tar -czf - VERSION docker-compose.staging.yml .env.staging.api .env.staging.web deploy/staging/nginx.conf deploy/staging/remote-deploy.sh \
            | ssh -i ~/.ssh/kiditem-staging "$target" \
                "mkdir -p ${remote_dir_q} && tar -xzf - -C ${remote_dir_q} && chmod +x ${remote_dir_q}/deploy/staging/remote-deploy.sh"

      - name: Deploy images on EC2
        env:
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          STAGING_USER: ${{ vars.STAGING_USER }}
          STAGING_REMOTE_DIR: ${{ vars.STAGING_REMOTE_DIR }}
          STAGING_URL: ${{ vars.STAGING_URL }}
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KIDITEM_API_IMAGE: ${{ needs.build_api.outputs.image_ref }}
          KIDITEM_WEB_IMAGE: ${{ needs.build_web.outputs.image_ref }}
          KIDITEM_API_IMAGE_TAG: ${{ needs.prepare.outputs.api_image_tag }}
          KIDITEM_WEB_IMAGE_TAG: ${{ needs.prepare.outputs.web_image_tag }}
          API_IMAGE_DIGEST: ${{ needs.build_api.outputs.digest }}
          WEB_IMAGE_DIGEST: ${{ needs.build_web.outputs.digest }}
          GIT_SHA: ${{ needs.prepare.outputs.git_sha }}
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALLOW_STAGING_DOWNTIME_FOR_SPACE: ${{ inputs.allow_downtime_for_space && '1' || '0' }}
        run: |
          set -euo pipefail
          : "${STAGING_HOST:?Set staging variable STAGING_HOST}"
          STAGING_USER="${STAGING_USER:-ubuntu}"
          STAGING_REMOTE_DIR="${STAGING_REMOTE_DIR:-/opt/kiditem}"
          target="${STAGING_USER}@${STAGING_HOST}"
          q() { printf '%q' "$1"; }
          # shellcheck disable=SC2087
          ssh -i ~/.ssh/kiditem-staging "$target" "cd $(q "$STAGING_REMOTE_DIR") && bash -s" <<REMOTE
          set -euo pipefail
          export GHCR_ACTOR=$(q "$GHCR_ACTOR")
          export GHCR_TOKEN=$(q "$GHCR_TOKEN")
          export KIDITEM_API_IMAGE=$(q "$KIDITEM_API_IMAGE")
          export KIDITEM_WEB_IMAGE=$(q "$KIDITEM_WEB_IMAGE")
          export KIDITEM_API_IMAGE_TAG=$(q "$KIDITEM_API_IMAGE_TAG")
          export KIDITEM_WEB_IMAGE_TAG=$(q "$KIDITEM_WEB_IMAGE_TAG")
          export API_IMAGE_DIGEST=$(q "$API_IMAGE_DIGEST")
          export WEB_IMAGE_DIGEST=$(q "$WEB_IMAGE_DIGEST")
          export GIT_SHA=$(q "$GIT_SHA")
          export APP_VERSION=$(q "$APP_VERSION")
          export DEPLOY_OPERATION=deploy
          export STAGING_URL=$(q "${STAGING_URL:-}")
          export GITHUB_ACTOR=$(q "$GITHUB_ACTOR")
          export GITHUB_REPOSITORY=$(q "$GITHUB_REPOSITORY")
          export GITHUB_RUN_ID=$(q "$GITHUB_RUN_ID")
          export GITHUB_RUN_ATTEMPT=$(q "$GITHUB_RUN_ATTEMPT")
          export GITHUB_RUN_URL=$(q "$GITHUB_RUN_URL")
          export ALLOW_STAGING_DOWNTIME_FOR_SPACE=$(q "$ALLOW_STAGING_DOWNTIME_FOR_SPACE")
          ./deploy/staging/remote-deploy.sh deploy
          REMOTE

      - name: Verify public staging URL
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          set -euo pipefail
          : "${STAGING_URL:?Set staging variable STAGING_URL}"
          STAGING_URL="${STAGING_URL%/}"

          for _ in $(seq 1 12); do
            login_code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "$STAGING_URL/login" || true)"
            auth_code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "$STAGING_URL/api/auth/me" || true)"
            if [[ "$login_code" == "200" && ( "$auth_code" == "401" || "$auth_code" == "403" ) ]]; then
              echo "Public staging smoke checks passed: $STAGING_URL/login=200, $STAGING_URL/api/auth/me=$auth_code"
              exit 0
            fi
            echo "Public staging not ready yet: /login=$login_code, /api/auth/me=$auth_code"
            sleep 5
          done

          echo "::error::Public staging URL did not become healthy: $STAGING_URL" >&2
          curl -sS -I --max-time 15 "$STAGING_URL/login" >&2 || true
          exit 1

      - name: Verify staging data migration status
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set staging secret STAGING_DATABASE_URL}"
          npm run data:migrate -- status

      - name: Tag successful staging deploy
        env:
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
          GIT_SHA: ${{ needs.prepare.outputs.git_sha }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          set -euo pipefail
          : "${APP_VERSION:?Missing prepared app version}"
          : "${GIT_SHA:?Missing prepared git SHA}"

          deploy_date="$(date -u +%Y%m%d)"
          short_sha="${GIT_SHA:0:8}"
          tag="staging-v${APP_VERSION}-${deploy_date}-${short_sha}"
          case "$tag" in
            staging-v[0-9]*.[0-9]*.[0-9]*-[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]-[0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f])
              ;;
            *)
              echo "::error::Refusing to create invalid staging tag: $tag" >&2
              exit 2
              ;;
          esac

          existing_refs="$(git ls-remote --tags origin "refs/tags/$tag" "refs/tags/$tag^{}")"
          if [ -n "$existing_refs" ]; then
            existing_commit="$(printf '%s\n' "$existing_refs" | awk '$2 ~ /\^\{\}$/ { print $1 }' | tail -n 1)"
            if [ -z "$existing_commit" ]; then
              existing_commit="$(printf '%s\n' "$existing_refs" | awk '{ print $1 }' | tail -n 1)"
            fi
            if [ "$existing_commit" = "$GIT_SHA" ]; then
              echo "Staging deploy tag already exists at this commit: $tag"
              exit 0
            fi
            echo "::error::Staging deploy tag already exists at a different object: $tag" >&2
            printf '%s\n' "$existing_refs" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" "$GIT_SHA" \
            -m "Staging deploy v${APP_VERSION}" \
            -m "Run: ${GITHUB_RUN_URL}" \
            -m "URL: ${STAGING_URL:-unset}"
          git push origin "refs/tags/$tag"
          echo "Created staging deploy tag: $tag"

      - name: Query final EC2 status
        env:
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          STAGING_USER: ${{ vars.STAGING_USER }}
          STAGING_REMOTE_DIR: ${{ vars.STAGING_REMOTE_DIR }}
        run: |
          set -euo pipefail
          : "${STAGING_HOST:?Set staging variable STAGING_HOST}"
          STAGING_USER="${STAGING_USER:-ubuntu}"
          STAGING_REMOTE_DIR="${STAGING_REMOTE_DIR:-/opt/kiditem}"
          q() { printf '%q' "$1"; }
          ssh -i ~/.ssh/kiditem-staging "${STAGING_USER}@${STAGING_HOST}" \
            "cd $(q "$STAGING_REMOTE_DIR") && ./deploy/staging/remote-deploy.sh status"

      - name: Write staging deployment summary
        if: always()
        env:
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
          GIT_SHA: ${{ needs.prepare.outputs.git_sha }}
          API_IMAGE: ${{ needs.build_api.outputs.image_ref }}
          WEB_IMAGE: ${{ needs.build_web.outputs.image_ref }}
          STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          {
            echo "## Staging deploy"
            echo
            echo "- Version: \`${APP_VERSION}\`"
            echo "- Git SHA: \`${GIT_SHA}\`"
            echo "- API image: \`${API_IMAGE}\`"
            echo "- Web image: \`${WEB_IMAGE}\`"
            echo "- URL: ${STAGING_URL:-unset}"
            echo "- Runbook: \`docs/runbooks/staging-deploy.md\`"
          } >> "$GITHUB_STEP_SUMMARY"

  rollback:
    name: Roll back staging
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'rollback'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Render staging runtime env files
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}
          SUPABASE_URL: ${{ vars.STAGING_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          SOURCING_EXTENSION_TOKEN_SECRET: ${{ secrets.STAGING_SOURCING_EXTENSION_TOKEN_SECRET }}
          SOURCING_EXTENSION_TOKEN_TTL_SECONDS: ${{ vars.STAGING_SOURCING_EXTENSION_TOKEN_TTL_SECONDS }}
          SOURCING_EXTENSION_TOKEN_MAX_SECONDS: ${{ vars.STAGING_SOURCING_EXTENSION_TOKEN_MAX_SECONDS }}
          CORS_ORIGINS: ${{ vars.STAGING_CORS_ORIGINS || vars.STAGING_URL }}
          S3_REGION: ${{ vars.STAGING_S3_REGION }}
          S3_BUCKET: ${{ vars.STAGING_S3_BUCKET }}
          S3_ENDPOINT: ${{ vars.STAGING_S3_ENDPOINT }}
          S3_PUBLIC_URL: ${{ vars.STAGING_S3_PUBLIC_URL }}
          S3_ACCESS_KEY: ${{ secrets.STAGING_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.STAGING_S3_SECRET_KEY }}
          CHANNEL_CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.STAGING_CHANNEL_CREDENTIALS_ENCRYPTION_KEY }}
          NAVER_DATALAB_CLIENT_ID: ${{ secrets.STAGING_NAVER_DATALAB_CLIENT_ID }}
          NAVER_DATALAB_CLIENT_SECRET: ${{ secrets.STAGING_NAVER_DATALAB_CLIENT_SECRET }}
          NAVER_DATALAB_BASE_URL: ${{ vars.STAGING_NAVER_DATALAB_BASE_URL }}
          NAVER_DATALAB_WEB_BASE_URL: ${{ vars.STAGING_NAVER_DATALAB_WEB_BASE_URL }}
          NAVER_SEARCHAD_API_KEY: ${{ secrets.STAGING_NAVER_SEARCHAD_API_KEY }}
          NAVER_SEARCHAD_SECRET_KEY: ${{ secrets.STAGING_NAVER_SEARCHAD_SECRET_KEY }}
          NAVER_SEARCHAD_CUSTOMER_ID: ${{ secrets.STAGING_NAVER_SEARCHAD_CUSTOMER_ID }}
          NAVER_SEARCHAD_BASE_URL: ${{ vars.STAGING_NAVER_SEARCHAD_BASE_URL }}
          DIRECT_1688_MTOP_BASE_URL: ${{ vars.STAGING_DIRECT_1688_MTOP_BASE_URL }}
          TMAPI_TOKEN: ${{ secrets.STAGING_TMAPI_TOKEN }}
          TMAPI_BASE_URL: ${{ vars.STAGING_TMAPI_BASE_URL }}
          GEMINI_API_KEY: ${{ secrets.STAGING_GEMINI_API_KEY }}
          AI_TEXT_MODEL: ${{ vars.STAGING_AI_TEXT_MODEL }}
          AI_IMAGE_MODEL: ${{ vars.STAGING_AI_IMAGE_MODEL }}
          AI_IMAGE_ANALYSIS_MODEL: ${{ vars.STAGING_AI_IMAGE_ANALYSIS_MODEL }}
          AI_IMAGE_ANALYSIS_VERIFY_MODEL: ${{ vars.STAGING_AI_IMAGE_ANALYSIS_VERIFY_MODEL }}
          AGENT_RUNTIME_WORKER_ENABLED: ${{ vars.STAGING_AGENT_RUNTIME_WORKER_ENABLED }}
          AGENT_DEFAULT_MODEL: ${{ vars.STAGING_AGENT_DEFAULT_MODEL }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          bash deploy/staging/render-runtime-env.sh

      - name: Prepare SSH
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${STAGING_SSH_KEY:?Set staging secret STAGING_SSH_KEY}"
          : "${STAGING_SSH_KNOWN_HOSTS:?Set staging secret STAGING_SSH_KNOWN_HOSTS}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/kiditem-staging
          chmod 600 ~/.ssh/kiditem-staging
          printf '%s\n' "$STAGING_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Sync staging compose assets
        env:
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          STAGING_USER: ${{ vars.STAGING_USER }}
          STAGING_REMOTE_DIR: ${{ vars.STAGING_REMOTE_DIR }}
        run: |
          set -euo pipefail
          : "${STAGING_HOST:?Set staging variable STAGING_HOST}"
          STAGING_USER="${STAGING_USER:-ubuntu}"
          STAGING_REMOTE_DIR="${STAGING_REMOTE_DIR:-/opt/kiditem}"
          case "$STAGING_USER" in (*[!A-Za-z0-9_.-]*|'') echo "Invalid STAGING_USER" >&2; exit 2 ;; esac
          case "$STAGING_REMOTE_DIR" in (/*) ;; (*) echo "STAGING_REMOTE_DIR must be absolute" >&2; exit 2 ;; esac
          case "$STAGING_REMOTE_DIR" in (*[!A-Za-z0-9_./-]*) echo "Invalid STAGING_REMOTE_DIR" >&2; exit 2 ;; esac
          target="${STAGING_USER}@${STAGING_HOST}"
          remote_dir_q="$(printf '%q' "$STAGING_REMOTE_DIR")"
          tar -czf - VERSION docker-compose.staging.yml .env.staging.api .env.staging.web deploy/staging/nginx.conf deploy/staging/remote-deploy.sh \
            | ssh -i ~/.ssh/kiditem-staging "$target" \
                "mkdir -p ${remote_dir_q} && tar -xzf - -C ${remote_dir_q} && chmod +x ${remote_dir_q}/deploy/staging/remote-deploy.sh"

      - name: Deploy selected rollback tag
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          STAGING_USER: ${{ vars.STAGING_USER }}
          STAGING_REMOTE_DIR: ${{ vars.STAGING_REMOTE_DIR }}
          STAGING_URL: ${{ vars.STAGING_URL }}
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          : "${IMAGE_TAG:?image_tag input is required for rollback}"
          case "$IMAGE_TAG" in (*[!A-Za-z0-9_.-]*|staging) echo "Use an immutable git SHA tag for rollback, not '$IMAGE_TAG'" >&2; exit 2 ;; esac
          : "${STAGING_HOST:?Set staging variable STAGING_HOST}"
          STAGING_USER="${STAGING_USER:-ubuntu}"
          STAGING_REMOTE_DIR="${STAGING_REMOTE_DIR:-/opt/kiditem}"
          target="${STAGING_USER}@${STAGING_HOST}"
          q() { printf '%q' "$1"; }
          API_IMAGE="${API_IMAGE_BASE}:${IMAGE_TAG}"
          WEB_IMAGE="${WEB_IMAGE_BASE}:${IMAGE_TAG}"
          # shellcheck disable=SC2087
          ssh -i ~/.ssh/kiditem-staging "$target" "cd $(q "$STAGING_REMOTE_DIR") && bash -s" <<REMOTE
          set -euo pipefail
          export GHCR_ACTOR=$(q "$GHCR_ACTOR")
          export GHCR_TOKEN=$(q "$GHCR_TOKEN")
          export KIDITEM_API_IMAGE=$(q "$API_IMAGE")
          export KIDITEM_WEB_IMAGE=$(q "$WEB_IMAGE")
          export KIDITEM_API_IMAGE_TAG=$(q "$API_IMAGE")
          export KIDITEM_WEB_IMAGE_TAG=$(q "$WEB_IMAGE")
          export GIT_SHA=$(q "$IMAGE_TAG")
          export DEPLOY_OPERATION=rollback
          export STAGING_URL=$(q "${STAGING_URL:-}")
          export GITHUB_ACTOR=$(q "$GITHUB_ACTOR")
          export GITHUB_REPOSITORY=$(q "$GITHUB_REPOSITORY")
          export GITHUB_RUN_ID=$(q "$GITHUB_RUN_ID")
          export GITHUB_RUN_ATTEMPT=$(q "$GITHUB_RUN_ATTEMPT")
          export GITHUB_RUN_URL=$(q "$GITHUB_RUN_URL")
          ./deploy/staging/remote-deploy.sh deploy
          REMOTE

      - name: Write staging rollback summary
        if: always()
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          {
            echo "## Staging rollback"
            echo
            echo "- Image tag: \`${IMAGE_TAG}\`"
            echo "- URL: ${STAGING_URL:-unset}"
            echo "- Runbook: \`docs/runbooks/staging-deploy.md\`"
          } >> "$GITHUB_STEP_SUMMARY"

  status:
    name: Show staging status
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'status'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare SSH
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${STAGING_SSH_KEY:?Set staging secret STAGING_SSH_KEY}"
          : "${STAGING_SSH_KNOWN_HOSTS:?Set staging secret STAGING_SSH_KNOWN_HOSTS}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/kiditem-staging
          chmod 600 ~/.ssh/kiditem-staging
          printf '%s\n' "$STAGING_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Sync staging status script
        env:
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          STAGING_USER: ${{ vars.STAGING_USER }}
          STAGING_REMOTE_DIR: ${{ vars.STAGING_REMOTE_DIR }}
        run: |
          set -euo pipefail
          : "${STAGING_HOST:?Set staging variable STAGING_HOST}"
          STAGING_USER="${STAGING_USER:-ubuntu}"
          STAGING_REMOTE_DIR="${STAGING_REMOTE_DIR:-/opt/kiditem}"
          case "$STAGING_USER" in (*[!A-Za-z0-9_.-]*|'') echo "Invalid STAGING_USER" >&2; exit 2 ;; esac
          case "$STAGING_REMOTE_DIR" in (/*) ;; (*) echo "STAGING_REMOTE_DIR must be absolute" >&2; exit 2 ;; esac
          case "$STAGING_REMOTE_DIR" in (*[!A-Za-z0-9_./-]*) echo "Invalid STAGING_REMOTE_DIR" >&2; exit 2 ;; esac
          target="${STAGING_USER}@${STAGING_HOST}"
          remote_dir_q="$(printf '%q' "$STAGING_REMOTE_DIR")"
          tar -czf - VERSION docker-compose.staging.yml deploy/staging/nginx.conf deploy/staging/remote-deploy.sh \
            | ssh -i ~/.ssh/kiditem-staging "$target" \
                "mkdir -p ${remote_dir_q} && tar -xzf - -C ${remote_dir_q} && chmod +x ${remote_dir_q}/deploy/staging/remote-deploy.sh"

      - name: Query EC2 status
        env:
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          STAGING_USER: ${{ vars.STAGING_USER }}
          STAGING_REMOTE_DIR: ${{ vars.STAGING_REMOTE_DIR }}
        run: |
          set -euo pipefail
          : "${STAGING_HOST:?Set staging variable STAGING_HOST}"
          STAGING_USER="${STAGING_USER:-ubuntu}"
          STAGING_REMOTE_DIR="${STAGING_REMOTE_DIR:-/opt/kiditem}"
          q() { printf '%q' "$1"; }
          ssh -i ~/.ssh/kiditem-staging "${STAGING_USER}@${STAGING_HOST}" \
            "cd $(q "$STAGING_REMOTE_DIR") && ./deploy/staging/remote-deploy.sh status"

      - name: Write staging status summary
        if: always()
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          {
            echo "## Staging status"
            echo
            echo "- URL: ${STAGING_URL:-unset}"
            echo "- Runbook: \`docs/runbooks/staging-deploy.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
