name: Staging Deploy

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Deploy this ref, show staging status, or rollback to an existing GHCR tag.
        type: choice
        required: true
        default: deploy
        options:
          - deploy
          - status
          - rollback
      image_tag:
        description: Existing GHCR tag for rollback. Use a git SHA tag, not "staging".
        required: false
        type: string
      accept_data_loss:
        description: Allow Prisma db push --accept-data-loss for reviewed contract cleanup deploys.
        required: false
        type: boolean
        default: false

concurrency:
  group: staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE_BASE: ghcr.io/agentfoundry-labs/kiditem-api
  API_RUNTIME_BASE_IMAGE: ghcr.io/agentfoundry-labs/kiditem-api-base:node22-chromium
  WEB_IMAGE_BASE: ghcr.io/agentfoundry-labs/kiditem-web

jobs:
  prepare:
    name: Prepare staging image refs
    if: inputs.operation == 'deploy'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    outputs:
      git_sha: ${{ steps.refs.outputs.git_sha }}
      app_version: ${{ steps.refs.outputs.app_version }}
      api_image_tag: ${{ steps.refs.outputs.api_image_tag }}
      web_image_tag: ${{ steps.refs.outputs.web_image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate staging build variables
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          : "${NEXT_PUBLIC_SUPABASE_URL:?Set staging variable NEXT_PUBLIC_SUPABASE_URL}"
          : "${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:?Set staging variable NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}"

      - name: Compute image references
        id: refs
        run: |
          set -euo pipefail
          app_version="$(tr -d '[:space:]' < VERSION)"
          case "$app_version" in
            [0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "Invalid root VERSION: $app_version" >&2
              exit 2
              ;;
          esac
          echo "git_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "api_image_tag=${API_IMAGE_BASE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "web_image_tag=${WEB_IMAGE_BASE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  build_api:
    name: Build and push API image
    if: inputs.operation == 'deploy'
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api_image_ref: ${{ steps.image_refs.outputs.api_image_ref }}
      api_digest: ${{ steps.build_api.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify API runtime base image
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "$API_RUNTIME_BASE_IMAGE" >/dev/null || {
            echo "::error::API runtime base image not found: $API_RUNTIME_BASE_IMAGE. Run the API Runtime Base Image workflow first."
            exit 1
          }

      - name: API image metadata
        id: api_meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.API_IMAGE_BASE }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=staging
          labels: |
            org.opencontainers.image.title=KidItem Staging API
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.app_version }}

      - name: Build and push API image
        id: build_api
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./apps/server/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            API_RUNTIME_BASE_IMAGE=${{ env.API_RUNTIME_BASE_IMAGE }}
          tags: ${{ steps.api_meta.outputs.tags }}
          labels: ${{ steps.api_meta.outputs.labels }}
          cache-from: type=gha,scope=staging-api
          cache-to: type=gha,mode=max,scope=staging-api

      - name: Emit API digest image reference
        id: image_refs
        env:
          API_DIGEST: ${{ steps.build_api.outputs.digest }}
        run: |
          set -euo pipefail
          echo "api_image_ref=${API_IMAGE_BASE}@${API_DIGEST}" >> "$GITHUB_OUTPUT"

  build_web:
    name: Build and push web image
    if: inputs.operation == 'deploy'
    needs: prepare
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write
    outputs:
      web_image_ref: ${{ steps.image_refs.outputs.web_image_ref }}
      web_digest: ${{ steps.build_web.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Web image metadata
        id: web_meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.WEB_IMAGE_BASE }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=staging
          labels: |
            org.opencontainers.image.title=KidItem Staging Web
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.app_version }}

      - name: Build and push web image
        id: build_web
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          tags: ${{ steps.web_meta.outputs.tags }}
          labels: ${{ steps.web_meta.outputs.labels }}
          cache-from: type=gha,scope=staging-web
          cache-to: type=gha,mode=max,scope=staging-web

      - name: Emit web digest image reference
        id: image_refs
        env:
          WEB_DIGEST: ${{ steps.build_web.outputs.digest }}
        run: |
          set -euo pipefail
          echo "web_image_ref=${WEB_IMAGE_BASE}@${WEB_DIGEST}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to staging
    if: inputs.operation == 'deploy'
    needs:
      - prepare
      - build_api
      - build_web
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install DB migration dependencies
        run: |
          set -euo pipefail
          npm ci --ignore-scripts \
            --fetch-timeout=600000 \
            --fetch-retries=5 \
            --fetch-retry-mintimeout=20000 \
            --fetch-retry-maxtimeout=120000 \
            --no-audit \
            --no-fund

      - name: Run pre-schema data migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DATA_MIGRATION_TARGET: staging
          DATA_MIGRATION_CONFIRM: APPLY_DATA_MIGRATIONS
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set staging secret STAGING_DATABASE_URL}"
          npm run data:migrate -- up --phase pre-schema

      - name: Apply staging Prisma schema
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          ACCEPT_DATA_LOSS: ${{ inputs.accept_data_loss }}
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set staging secret STAGING_DATABASE_URL}"
          node <<'NODE'
          const raw = process.env.DATABASE_URL || '';
          let target = raw;
          try {
            const url = new URL(raw);
            target = `${url.hostname} ${url.pathname}`;
          } catch {}
          if (/\bprod(?:uction)?\b/i.test(target)) {
            console.error('DATABASE_URL host/path looks production-like');
            process.exit(2);
          }
          NODE
          if [ "${ACCEPT_DATA_LOSS}" = "true" ]; then
            echo "::warning::Running Prisma db push with --accept-data-loss for a reviewed staging contract cleanup."
            npx prisma db push --accept-data-loss
          else
            npx prisma db push
          fi
          npx prisma generate

      - name: Run post-schema data migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DATA_MIGRATION_TARGET: staging
          DATA_MIGRATION_CONFIRM: APPLY_DATA_MIGRATIONS
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set staging secret STAGING_DATABASE_URL}"
          npm run data:migrate -- up --phase post-schema

      - name: Prepare SSH
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${STAGING_SSH_KEY:?Set staging secret STAGING_SSH_KEY}"
          : "${STAGING_SSH_KNOWN_HOSTS:?Set staging secret STAGING_SSH_KNOWN_HOSTS}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/kiditem-staging
          chmod 600 ~/.ssh/kiditem-staging
          printf '%s\n' "$STAGING_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Sync staging compose assets
        env:
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          STAGING_USER: ${{ vars.STAGING_USER }}
          STAGING_REMOTE_DIR: ${{ vars.STAGING_REMOTE_DIR }}
        run: |
          set -euo pipefail
          ./deploy/staging/remote-deploy.sh --help >/dev/null
          : "${STAGING_HOST:?Set staging variable STAGING_HOST}"
          STAGING_USER="${STAGING_USER:-ubuntu}"
          STAGING_REMOTE_DIR="${STAGING_REMOTE_DIR:-/opt/kiditem}"
          case "$STAGING_USER" in (*[!A-Za-z0-9_.-]*|'') echo "Invalid STAGING_USER" >&2; exit 2 ;; esac
          case "$STAGING_REMOTE_DIR" in (/*) ;; (*) echo "STAGING_REMOTE_DIR must be absolute" >&2; exit 2 ;; esac
          case "$STAGING_REMOTE_DIR" in (*[!A-Za-z0-9_./-]*) echo "Invalid STAGING_REMOTE_DIR" >&2; exit 2 ;; esac
          target="${STAGING_USER}@${STAGING_HOST}"
          remote_dir_q="$(printf '%q' "$STAGING_REMOTE_DIR")"
          tar -czf - VERSION docker-compose.staging.yml deploy/staging/nginx.conf deploy/staging/remote-deploy.sh \
            | ssh -i ~/.ssh/kiditem-staging "$target" \
                "mkdir -p ${remote_dir_q} && tar -xzf - -C ${remote_dir_q} && chmod +x ${remote_dir_q}/deploy/staging/remote-deploy.sh"

      - name: Deploy images on EC2
        env:
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          STAGING_USER: ${{ vars.STAGING_USER }}
          STAGING_REMOTE_DIR: ${{ vars.STAGING_REMOTE_DIR }}
          STAGING_URL: ${{ vars.STAGING_URL }}
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KIDITEM_API_IMAGE: ${{ needs.build_api.outputs.api_image_ref }}
          KIDITEM_WEB_IMAGE: ${{ needs.build_web.outputs.web_image_ref }}
          KIDITEM_API_IMAGE_TAG: ${{ needs.prepare.outputs.api_image_tag }}
          KIDITEM_WEB_IMAGE_TAG: ${{ needs.prepare.outputs.web_image_tag }}
          API_IMAGE_DIGEST: ${{ needs.build_api.outputs.api_digest }}
          WEB_IMAGE_DIGEST: ${{ needs.build_web.outputs.web_digest }}
          GIT_SHA: ${{ needs.prepare.outputs.git_sha }}
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          : "${STAGING_HOST:?Set staging variable STAGING_HOST}"
          STAGING_USER="${STAGING_USER:-ubuntu}"
          STAGING_REMOTE_DIR="${STAGING_REMOTE_DIR:-/opt/kiditem}"
          target="${STAGING_USER}@${STAGING_HOST}"
          q() { printf '%q' "$1"; }
          ssh -i ~/.ssh/kiditem-staging "$target" "cd $(q "$STAGING_REMOTE_DIR") && bash -s" <<REMOTE
          set -euo pipefail
          export GHCR_ACTOR=$(q "$GHCR_ACTOR")
          export GHCR_TOKEN=$(q "$GHCR_TOKEN")
          export KIDITEM_API_IMAGE=$(q "$KIDITEM_API_IMAGE")
          export KIDITEM_WEB_IMAGE=$(q "$KIDITEM_WEB_IMAGE")
          export KIDITEM_API_IMAGE_TAG=$(q "$KIDITEM_API_IMAGE_TAG")
          export KIDITEM_WEB_IMAGE_TAG=$(q "$KIDITEM_WEB_IMAGE_TAG")
          export API_IMAGE_DIGEST=$(q "$API_IMAGE_DIGEST")
          export WEB_IMAGE_DIGEST=$(q "$WEB_IMAGE_DIGEST")
          export GIT_SHA=$(q "$GIT_SHA")
          export APP_VERSION=$(q "$APP_VERSION")
          export DEPLOY_OPERATION=deploy
          export STAGING_URL=$(q "${STAGING_URL:-}")
          export GITHUB_ACTOR=$(q "$GITHUB_ACTOR")
          export GITHUB_REPOSITORY=$(q "$GITHUB_REPOSITORY")
          export GITHUB_RUN_ID=$(q "$GITHUB_RUN_ID")
          export GITHUB_RUN_ATTEMPT=$(q "$GITHUB_RUN_ATTEMPT")
          export GITHUB_RUN_URL=$(q "$GITHUB_RUN_URL")
          ./deploy/staging/remote-deploy.sh deploy
          REMOTE

      - name: Verify staging data migration status
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set staging secret STAGING_DATABASE_URL}"
          npm run data:migrate -- status

  rollback:
    name: Roll back staging
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'rollback'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare SSH
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${STAGING_SSH_KEY:?Set staging secret STAGING_SSH_KEY}"
          : "${STAGING_SSH_KNOWN_HOSTS:?Set staging secret STAGING_SSH_KNOWN_HOSTS}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/kiditem-staging
          chmod 600 ~/.ssh/kiditem-staging
          printf '%s\n' "$STAGING_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Sync staging compose assets
        env:
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          STAGING_USER: ${{ vars.STAGING_USER }}
          STAGING_REMOTE_DIR: ${{ vars.STAGING_REMOTE_DIR }}
        run: |
          set -euo pipefail
          : "${STAGING_HOST:?Set staging variable STAGING_HOST}"
          STAGING_USER="${STAGING_USER:-ubuntu}"
          STAGING_REMOTE_DIR="${STAGING_REMOTE_DIR:-/opt/kiditem}"
          case "$STAGING_USER" in (*[!A-Za-z0-9_.-]*|'') echo "Invalid STAGING_USER" >&2; exit 2 ;; esac
          case "$STAGING_REMOTE_DIR" in (/*) ;; (*) echo "STAGING_REMOTE_DIR must be absolute" >&2; exit 2 ;; esac
          case "$STAGING_REMOTE_DIR" in (*[!A-Za-z0-9_./-]*) echo "Invalid STAGING_REMOTE_DIR" >&2; exit 2 ;; esac
          target="${STAGING_USER}@${STAGING_HOST}"
          remote_dir_q="$(printf '%q' "$STAGING_REMOTE_DIR")"
          tar -czf - VERSION docker-compose.staging.yml deploy/staging/nginx.conf deploy/staging/remote-deploy.sh \
            | ssh -i ~/.ssh/kiditem-staging "$target" \
                "mkdir -p ${remote_dir_q} && tar -xzf - -C ${remote_dir_q} && chmod +x ${remote_dir_q}/deploy/staging/remote-deploy.sh"

      - name: Deploy selected rollback tag
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          STAGING_USER: ${{ vars.STAGING_USER }}
          STAGING_REMOTE_DIR: ${{ vars.STAGING_REMOTE_DIR }}
          STAGING_URL: ${{ vars.STAGING_URL }}
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          : "${IMAGE_TAG:?image_tag input is required for rollback}"
          case "$IMAGE_TAG" in (*[!A-Za-z0-9_.-]*|staging) echo "Use an immutable git SHA tag for rollback, not '$IMAGE_TAG'" >&2; exit 2 ;; esac
          : "${STAGING_HOST:?Set staging variable STAGING_HOST}"
          STAGING_USER="${STAGING_USER:-ubuntu}"
          STAGING_REMOTE_DIR="${STAGING_REMOTE_DIR:-/opt/kiditem}"
          target="${STAGING_USER}@${STAGING_HOST}"
          q() { printf '%q' "$1"; }
          API_IMAGE="${API_IMAGE_BASE}:${IMAGE_TAG}"
          WEB_IMAGE="${WEB_IMAGE_BASE}:${IMAGE_TAG}"
          ssh -i ~/.ssh/kiditem-staging "$target" "cd $(q "$STAGING_REMOTE_DIR") && bash -s" <<REMOTE
          set -euo pipefail
          export GHCR_ACTOR=$(q "$GHCR_ACTOR")
          export GHCR_TOKEN=$(q "$GHCR_TOKEN")
          export KIDITEM_API_IMAGE=$(q "$API_IMAGE")
          export KIDITEM_WEB_IMAGE=$(q "$WEB_IMAGE")
          export KIDITEM_API_IMAGE_TAG=$(q "$API_IMAGE")
          export KIDITEM_WEB_IMAGE_TAG=$(q "$WEB_IMAGE")
          export GIT_SHA=$(q "$IMAGE_TAG")
          export DEPLOY_OPERATION=rollback
          export STAGING_URL=$(q "${STAGING_URL:-}")
          export GITHUB_ACTOR=$(q "$GITHUB_ACTOR")
          export GITHUB_REPOSITORY=$(q "$GITHUB_REPOSITORY")
          export GITHUB_RUN_ID=$(q "$GITHUB_RUN_ID")
          export GITHUB_RUN_ATTEMPT=$(q "$GITHUB_RUN_ATTEMPT")
          export GITHUB_RUN_URL=$(q "$GITHUB_RUN_URL")
          ./deploy/staging/remote-deploy.sh deploy
          REMOTE

  status:
    name: Show staging status
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'status'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare SSH
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${STAGING_SSH_KEY:?Set staging secret STAGING_SSH_KEY}"
          : "${STAGING_SSH_KNOWN_HOSTS:?Set staging secret STAGING_SSH_KNOWN_HOSTS}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/kiditem-staging
          chmod 600 ~/.ssh/kiditem-staging
          printf '%s\n' "$STAGING_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Sync staging status script
        env:
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          STAGING_USER: ${{ vars.STAGING_USER }}
          STAGING_REMOTE_DIR: ${{ vars.STAGING_REMOTE_DIR }}
        run: |
          set -euo pipefail
          : "${STAGING_HOST:?Set staging variable STAGING_HOST}"
          STAGING_USER="${STAGING_USER:-ubuntu}"
          STAGING_REMOTE_DIR="${STAGING_REMOTE_DIR:-/opt/kiditem}"
          case "$STAGING_USER" in (*[!A-Za-z0-9_.-]*|'') echo "Invalid STAGING_USER" >&2; exit 2 ;; esac
          case "$STAGING_REMOTE_DIR" in (/*) ;; (*) echo "STAGING_REMOTE_DIR must be absolute" >&2; exit 2 ;; esac
          case "$STAGING_REMOTE_DIR" in (*[!A-Za-z0-9_./-]*) echo "Invalid STAGING_REMOTE_DIR" >&2; exit 2 ;; esac
          target="${STAGING_USER}@${STAGING_HOST}"
          remote_dir_q="$(printf '%q' "$STAGING_REMOTE_DIR")"
          tar -czf - VERSION docker-compose.staging.yml deploy/staging/nginx.conf deploy/staging/remote-deploy.sh \
            | ssh -i ~/.ssh/kiditem-staging "$target" \
                "mkdir -p ${remote_dir_q} && tar -xzf - -C ${remote_dir_q} && chmod +x ${remote_dir_q}/deploy/staging/remote-deploy.sh"

      - name: Query EC2 status
        env:
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          STAGING_USER: ${{ vars.STAGING_USER }}
          STAGING_REMOTE_DIR: ${{ vars.STAGING_REMOTE_DIR }}
        run: |
          set -euo pipefail
          : "${STAGING_HOST:?Set staging variable STAGING_HOST}"
          STAGING_USER="${STAGING_USER:-ubuntu}"
          STAGING_REMOTE_DIR="${STAGING_REMOTE_DIR:-/opt/kiditem}"
          q() { printf '%q' "$1"; }
          ssh -i ~/.ssh/kiditem-staging "${STAGING_USER}@${STAGING_HOST}" \
            "cd $(q "$STAGING_REMOTE_DIR") && ./deploy/staging/remote-deploy.sh status"
