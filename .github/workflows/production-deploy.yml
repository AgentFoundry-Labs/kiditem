name: Production Deploy
run-name: "production ${{ inputs.operation }} correlation=${{ inputs.dispatch_correlation_id }}"

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Deploy this ref, finalize a guarded rebuild, show status, or roll back.
        type: choice
        required: true
        default: status
        options:
          - deploy
          - finalize-rebuild
          - status
          - rollback
      deployment_target:
        description: Shared database target. This workflow accepts production only.
        type: choice
        required: true
        default: production
        options:
          - production
      expected_git_sha:
        description: Full immutable workflow-code SHA selected for this run.
        required: true
        type: string
      dispatch_correlation_id:
        description: Operator-generated UUID used to select this exact run.
        required: true
        type: string
      destructive_reset:
        description: Exact RESET_PRODUCTION_DATA confirmation for rebuild deploys and finalization.
        required: false
        type: string
      rebuild_run_id:
        description: Originating destructive deploy run ID; required for finalize-rebuild.
        required: false
        type: string
      image_tag:
        description: Existing GHCR tag for rollback. Use a git SHA tag, not "production".
        required: false
        type: string
      confirm:
        description: Use DEPLOY_PRODUCTION for deploy or ROLLBACK_PRODUCTION for rollback.
        required: false
        type: string
      allow_downtime_for_space:
        description: Stop the current production stack if image pull needs active-layer disk space.
        required: false
        type: boolean
        default: false

concurrency:
  group: production
  cancel-in-progress: false

env:
  API_IMAGE_BASE: ghcr.io/agentfoundry-labs/kiditem-api
  API_RUNTIME_BASE_IMAGE: ghcr.io/agentfoundry-labs/kiditem-api-base:node22-chromium-b6503cb2512e
  WEB_IMAGE_BASE: ghcr.io/agentfoundry-labs/kiditem-web

jobs:
  identity_guard:
    name: Validate immutable dispatch identity
    runs-on: ubuntu-latest
    outputs:
      git_sha: ${{ steps.identity.outputs.git_sha }}
    steps:
      - name: Validate expected SHA and correlation
        id: identity
        env:
          EXPECTED_GIT_SHA: ${{ inputs.expected_git_sha }}
          DISPATCH_CORRELATION_ID: ${{ inputs.dispatch_correlation_id }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_GIT_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "expected_git_sha must be full 40-hex SHA" >&2; exit 2; }
          [[ "$DISPATCH_CORRELATION_ID" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[1-8][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$ ]] || { echo "dispatch_correlation_id must be UUID" >&2; exit 2; }
          [[ "$GITHUB_SHA" == "$EXPECTED_GIT_SHA" ]] || { echo "GITHUB_SHA does not match expected immutable SHA" >&2; exit 2; }
          echo "expected_git_sha=${EXPECTED_GIT_SHA}"
          echo "dispatch_correlation_id=${DISPATCH_CORRELATION_ID}"
          echo "git_sha=${EXPECTED_GIT_SHA}" >> "$GITHUB_OUTPUT"

  prepare:
    name: Prepare production image refs
    if: inputs.operation == 'deploy'
    needs: identity_guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      git_sha: ${{ steps.refs.outputs.git_sha }}
      app_version: ${{ steps.refs.outputs.app_version }}
      api_image_tag: ${{ steps.refs.outputs.api_image_tag }}
      web_image_tag: ${{ steps.refs.outputs.web_image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.identity_guard.outputs.git_sha }}

      - name: Validate production confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.PRODUCTION_NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.PRODUCTION_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          [[ "$CONFIRM" == "DEPLOY_PRODUCTION" ]] || { echo "confirm must be DEPLOY_PRODUCTION" >&2; exit 2; }
          : "${NEXT_PUBLIC_SUPABASE_URL:?Set production variable PRODUCTION_NEXT_PUBLIC_SUPABASE_URL}"
          : "${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:?Set production variable PRODUCTION_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}"

      - name: Compute image references
        id: refs
        run: |
          set -euo pipefail
          app_version="$(tr -d '[:space:]' < VERSION)"
          case "$app_version" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Invalid root VERSION: $app_version" >&2; exit 2 ;;
          esac
          {
            echo "git_sha=${{ needs.identity_guard.outputs.git_sha }}"
            echo "app_version=${app_version}"
            echo "api_image_tag=${API_IMAGE_BASE}:${{ needs.identity_guard.outputs.git_sha }}"
            echo "web_image_tag=${WEB_IMAGE_BASE}:${{ needs.identity_guard.outputs.git_sha }}"
          } >> "$GITHUB_OUTPUT"

  build_api:
    name: Build and push API image
    if: inputs.operation == 'deploy'
    needs: prepare
    uses: ./.github/workflows/build-image.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      image_base: ghcr.io/agentfoundry-labs/kiditem-api
      dockerfile: ./apps/server/Dockerfile
      cache_scope: production-api
      title: KidItem Production API
      app_version: ${{ needs.prepare.outputs.app_version }}
      build_args: |
        API_RUNTIME_BASE_IMAGE=ghcr.io/agentfoundry-labs/kiditem-api-base:node22-chromium-b6503cb2512e
      extra_tags: ghcr.io/agentfoundry-labs/kiditem-api:production-candidate
      preflight_image: ghcr.io/agentfoundry-labs/kiditem-api-base:node22-chromium-b6503cb2512e

  build_web:
    name: Build and push web image
    if: inputs.operation == 'deploy'
    needs: prepare
    uses: ./.github/workflows/build-image.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      image_base: ghcr.io/agentfoundry-labs/kiditem-web
      dockerfile: ./apps/web/Dockerfile
      cache_scope: production-web
      title: KidItem Production Web
      app_version: ${{ needs.prepare.outputs.app_version }}
      build_args: |
        NEXT_PUBLIC_API_URL=
        NEXT_PUBLIC_SUPABASE_URL=${{ vars.PRODUCTION_NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ vars.PRODUCTION_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      extra_tags: ghcr.io/agentfoundry-labs/kiditem-web:production-candidate

  deploy:
    name: Deploy to production
    if: inputs.operation == 'deploy'
    needs:
      - prepare
      - build_api
      - build_web
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare.outputs.git_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install DB migration dependencies
        run: npm ci --ignore-scripts --fetch-timeout=600000 --fetch-retries=5 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000 --no-audit --no-fund

      - name: Generate Prisma client for data migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set production secret PRODUCTION_DATABASE_URL}"
          npx prisma generate

      - name: Verify protected production database identity
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DATABASE_URL_SHA256: ${{ secrets.PRODUCTION_DATABASE_URL_SHA256 }}
          EXPECTED_DATABASE_NAME: ${{ vars.PRODUCTION_DATABASE_NAME }}
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set production database URL secret}"
          : "${DATABASE_URL_SHA256:?Set approved production URL SHA-256 secret}"
          : "${EXPECTED_DATABASE_NAME:?Set production expected database-name variable}"
          actual_url_sha="$(printf '%s' "$DATABASE_URL" | sha256sum | cut -d' ' -f1)"
          [[ "$actual_url_sha" == "$DATABASE_URL_SHA256" ]] || { echo "database URL fingerprint mismatch" >&2; exit 2; }
          url_database="$(DATABASE_URL="$DATABASE_URL" node -e 'const u=new URL(process.env.DATABASE_URL); process.stdout.write(decodeURIComponent(u.pathname.replace(/^\\//,"")))')"
          [[ "$url_database" == "$EXPECTED_DATABASE_NAME" ]] || { echo "database URL pathname mismatch" >&2; exit 2; }
          live_database="$(psql -X "$DATABASE_URL" -v ON_ERROR_STOP=1 -Atqc 'SELECT current_database()')"
          [[ "$live_database" == "$EXPECTED_DATABASE_NAME" ]] || { echo "live current_database() mismatch" >&2; exit 2; }

      - name: Validate production rebuild confirmation
        if: inputs.destructive_reset != ''
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DEPLOYMENT_TARGET: ${{ inputs.deployment_target }}
          REBUILD_TARGET: ${{ inputs.deployment_target }}
          GITHUB_ENVIRONMENT: production
          DESTRUCTIVE_RESET: ${{ inputs.destructive_reset }}
          EXPECTED_RESET_CONFIRMATION: RESET_PRODUCTION_DATA
          REBUILD_EXPECTED_DATABASE_HOST: ${{ secrets.PRODUCTION_REBUILD_EXPECTED_DATABASE_HOST }}
          REBUILD_EXPECTED_SUPABASE_PROJECT_REF: ${{ secrets.PRODUCTION_REBUILD_EXPECTED_SUPABASE_PROJECT_REF }}
          REBUILD_ORGANIZATION_ID: ${{ vars.PRODUCTION_REBUILD_ORGANIZATION_ID }}
          REBUILD_ORGANIZATION_SLUG: ${{ vars.PRODUCTION_REBUILD_ORGANIZATION_SLUG }}
          REBUILD_COUPANG_ACCOUNT_ID: ${{ vars.PRODUCTION_REBUILD_COUPANG_ACCOUNT_ID }}
          REBUILD_COUPANG_EXTERNAL_ACCOUNT_ID: ${{ secrets.PRODUCTION_REBUILD_COUPANG_EXTERNAL_ACCOUNT_ID }}
        run: npm run inventory:rebuild -- guard

      - name: Preflight protected production accounts and Supabase auth
        if: inputs.destructive_reset != ''
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DEPLOYMENT_TARGET: ${{ inputs.deployment_target }}
          REBUILD_TARGET: ${{ inputs.deployment_target }}
          GITHUB_ENVIRONMENT: production
          DESTRUCTIVE_RESET: ${{ inputs.destructive_reset }}
          EXPECTED_RESET_CONFIRMATION: RESET_PRODUCTION_DATA
          REBUILD_DEPLOYED_SHA: ${{ needs.prepare.outputs.git_sha }}
          REBUILD_ORGANIZATION_ID: ${{ vars.PRODUCTION_REBUILD_ORGANIZATION_ID }}
          REBUILD_ORGANIZATION_NAME: ${{ vars.PRODUCTION_REBUILD_ORGANIZATION_NAME }}
          REBUILD_ORGANIZATION_SLUG: ${{ vars.PRODUCTION_REBUILD_ORGANIZATION_SLUG }}
          REBUILD_USER_ID: ${{ vars.PRODUCTION_REBUILD_USER_ID }}
          REBUILD_USER_EMAIL: ${{ secrets.PRODUCTION_REBUILD_USER_EMAIL }}
          REBUILD_USER_NAME: ${{ vars.PRODUCTION_REBUILD_USER_NAME }}
          REBUILD_COUPANG_ACCOUNT_ID: ${{ vars.PRODUCTION_REBUILD_COUPANG_ACCOUNT_ID }}
          REBUILD_COUPANG_EXTERNAL_ACCOUNT_ID: ${{ secrets.PRODUCTION_REBUILD_COUPANG_EXTERNAL_ACCOUNT_ID }}
          REBUILD_COUPANG_ACCOUNT_NAME: ${{ vars.PRODUCTION_REBUILD_COUPANG_ACCOUNT_NAME }}
          REBUILD_ROCKET_ACCOUNT_ID: ${{ vars.PRODUCTION_REBUILD_ROCKET_ACCOUNT_ID }}
          REBUILD_ROCKET_EXTERNAL_ACCOUNT_ID: ${{ secrets.PRODUCTION_REBUILD_ROCKET_EXTERNAL_ACCOUNT_ID }}
          REBUILD_ROCKET_ACCOUNT_NAME: ${{ vars.PRODUCTION_REBUILD_ROCKET_ACCOUNT_NAME }}
          REBUILD_SELLPIA_FILE_SHA256: ${{ vars.PRODUCTION_REBUILD_SELLPIA_FILE_SHA256 }}
          REBUILD_SELLPIA_ROW_COUNT: ${{ vars.PRODUCTION_REBUILD_SELLPIA_ROW_COUNT }}
          REBUILD_WING_FILE_SHA256: ${{ vars.PRODUCTION_REBUILD_WING_FILE_SHA256 }}
          REBUILD_WING_ROW_COUNT: ${{ vars.PRODUCTION_REBUILD_WING_ROW_COUNT }}
          SUPABASE_URL: ${{ vars.PRODUCTION_SUPABASE_URL || vars.PRODUCTION_NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.PRODUCTION_SUPABASE_SECRET_KEY }}
          REBUILD_EXPECTED_SUPABASE_PROJECT_REF: ${{ secrets.PRODUCTION_REBUILD_EXPECTED_SUPABASE_PROJECT_REF }}
          REBUILD_BOOTSTRAP_PREFLIGHT_PATH: ${{ runner.temp }}/bootstrap-preflight.json
        run: npm run inventory:rebuild -- preflight-bootstrap --origin-run-id "${{ github.run_id }}"

      - name: Run pre-schema data migrations
        if: inputs.destructive_reset == ''
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DATA_MIGRATION_TARGET: production
          DATA_MIGRATION_CONFIRM: APPLY_DATA_MIGRATIONS
          DATA_MIGRATION_PRODUCTION_CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set production secret PRODUCTION_DATABASE_URL}"
          npm run data:migrate -- up --phase pre-schema

      - name: Prepare SSH for guarded rebuild
        if: inputs.destructive_reset != ''
        env:
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${PRODUCTION_SSH_KEY:?Set production secret PRODUCTION_SSH_KEY}"
          : "${PRODUCTION_SSH_KNOWN_HOSTS:?Set production secret PRODUCTION_SSH_KNOWN_HOSTS}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PRODUCTION_SSH_KEY" > ~/.ssh/kiditem-production
          chmod 600 ~/.ssh/kiditem-production
          printf '%s\n' "$PRODUCTION_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Sync production rebuild control script
        if: inputs.destructive_reset != ''
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
          PRODUCTION_REMOTE_DIR: ${{ vars.PRODUCTION_REMOTE_DIR }}
        run: |
          set -euo pipefail
          : "${PRODUCTION_HOST:?Set production variable PRODUCTION_HOST}"
          PRODUCTION_USER="${PRODUCTION_USER:-ubuntu}"
          PRODUCTION_REMOTE_DIR="${PRODUCTION_REMOTE_DIR:-/opt/kiditem}"
          target="${PRODUCTION_USER}@${PRODUCTION_HOST}"
          remote_dir_q="$(printf '%q' "$PRODUCTION_REMOTE_DIR")"
          tar -czf - deploy/production/remote-deploy.sh deploy/staging/remote-deploy.sh \
            | ssh -i ~/.ssh/kiditem-production "$target" \
                "mkdir -p ${remote_dir_q}/deploy/production ${remote_dir_q}/deploy/staging && tar -xzf - -C ${remote_dir_q} && chmod +x ${remote_dir_q}/deploy/production/remote-deploy.sh ${remote_dir_q}/deploy/staging/remote-deploy.sh"

      - name: Quiesce production application traffic
        id: quiesce
        if: inputs.destructive_reset != ''
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
          PRODUCTION_REMOTE_DIR: ${{ vars.PRODUCTION_REMOTE_DIR }}
        run: |
          set -euo pipefail
          PRODUCTION_USER="${PRODUCTION_USER:-ubuntu}"
          PRODUCTION_REMOTE_DIR="${PRODUCTION_REMOTE_DIR:-/opt/kiditem}"
          q() { printf '%q' "$1"; }
          ssh -i ~/.ssh/kiditem-production "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            "cd $(q "$PRODUCTION_REMOTE_DIR") && ./deploy/production/remote-deploy.sh quiesce"

      - name: Export approved Coupang replay bundle
        if: inputs.destructive_reset != ''
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DEPLOYMENT_TARGET: ${{ inputs.deployment_target }}
          REBUILD_TARGET: ${{ inputs.deployment_target }}
          GITHUB_ENVIRONMENT: production
          DESTRUCTIVE_RESET: ${{ inputs.destructive_reset }}
          EXPECTED_RESET_CONFIRMATION: RESET_PRODUCTION_DATA
          REBUILD_DEPLOYED_SHA: ${{ needs.prepare.outputs.git_sha }}
          REBUILD_ORGANIZATION_ID: ${{ vars.PRODUCTION_REBUILD_ORGANIZATION_ID }}
          REBUILD_COUPANG_ACCOUNT_ID: ${{ vars.PRODUCTION_REBUILD_COUPANG_ACCOUNT_ID }}
          REBUILD_COUPANG_EXTERNAL_ACCOUNT_ID: ${{ secrets.PRODUCTION_REBUILD_COUPANG_EXTERNAL_ACCOUNT_ID }}
          REBUILD_BUNDLE_PATH: ${{ runner.temp }}/authoritative-rebuild.json
        run: npm run inventory:rebuild -- export-coupang --origin-run-id "${{ github.run_id }}"

      - name: Export migration ledger rebuild baseline
        if: inputs.destructive_reset != ''
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DATA_MIGRATION_TARGET: production
          REBUILD_EXPECTED_GIT_SHA: ${{ needs.prepare.outputs.git_sha }}
          REBUILD_ORIGIN_RUN_ID: ${{ github.run_id }}
          REBUILD_MIGRATION_BASELINE_PATH: ${{ runner.temp }}/data-migration-baseline.json
        run: npm run data:migrate -- baseline-export

      - name: Preserve private rebuild bundle for one day
        if: inputs.destructive_reset != ''
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: authoritative-rebuild-${{ github.run_id }}-production
          path: |
            ${{ runner.temp }}/authoritative-rebuild.json
            ${{ runner.temp }}/data-migration-baseline.json
            ${{ runner.temp }}/bootstrap-preflight.json
          if-no-files-found: error
          retention-days: 1

      - name: Cross destructive reset boundary
        id: reset_boundary
        if: inputs.destructive_reset != ''
        run: echo "started=true" >> "$GITHUB_OUTPUT"

      - name: Rebuild production database from final schema
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DESTRUCTIVE_RESET: ${{ inputs.destructive_reset }}
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set production secret PRODUCTION_DATABASE_URL}"
          if [ -n "$DESTRUCTIVE_RESET" ]; then
            npx prisma db push --force-reset
          else
            npx prisma db push
          fi

      - name: Generate Prisma client after schema push
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set production secret PRODUCTION_DATABASE_URL}"
          npx prisma generate

      - name: Restore migration ledger rebuild baseline
        if: inputs.destructive_reset != ''
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DATA_MIGRATION_TARGET: production
          REBUILD_EXPECTED_GIT_SHA: ${{ needs.prepare.outputs.git_sha }}
          REBUILD_ORIGIN_RUN_ID: ${{ github.run_id }}
          REBUILD_MIGRATION_BASELINE_PATH: ${{ runner.temp }}/data-migration-baseline.json
        run: npm run data:migrate -- baseline-restore

      - name: Bootstrap production authentication and account baseline
        if: inputs.destructive_reset != ''
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DEPLOYMENT_TARGET: ${{ inputs.deployment_target }}
          REBUILD_TARGET: ${{ inputs.deployment_target }}
          GITHUB_ENVIRONMENT: production
          DESTRUCTIVE_RESET: ${{ inputs.destructive_reset }}
          EXPECTED_RESET_CONFIRMATION: RESET_PRODUCTION_DATA
          REBUILD_DEPLOYED_SHA: ${{ needs.prepare.outputs.git_sha }}
          REBUILD_ORGANIZATION_ID: ${{ vars.PRODUCTION_REBUILD_ORGANIZATION_ID }}
          REBUILD_ORGANIZATION_NAME: ${{ vars.PRODUCTION_REBUILD_ORGANIZATION_NAME }}
          REBUILD_ORGANIZATION_SLUG: ${{ vars.PRODUCTION_REBUILD_ORGANIZATION_SLUG }}
          REBUILD_USER_ID: ${{ vars.PRODUCTION_REBUILD_USER_ID }}
          REBUILD_USER_EMAIL: ${{ secrets.PRODUCTION_REBUILD_USER_EMAIL }}
          REBUILD_USER_NAME: ${{ vars.PRODUCTION_REBUILD_USER_NAME }}
          REBUILD_COUPANG_ACCOUNT_ID: ${{ vars.PRODUCTION_REBUILD_COUPANG_ACCOUNT_ID }}
          REBUILD_COUPANG_EXTERNAL_ACCOUNT_ID: ${{ secrets.PRODUCTION_REBUILD_COUPANG_EXTERNAL_ACCOUNT_ID }}
          REBUILD_COUPANG_ACCOUNT_NAME: ${{ vars.PRODUCTION_REBUILD_COUPANG_ACCOUNT_NAME }}
          REBUILD_ROCKET_ACCOUNT_ID: ${{ vars.PRODUCTION_REBUILD_ROCKET_ACCOUNT_ID }}
          REBUILD_ROCKET_EXTERNAL_ACCOUNT_ID: ${{ secrets.PRODUCTION_REBUILD_ROCKET_EXTERNAL_ACCOUNT_ID }}
          REBUILD_ROCKET_ACCOUNT_NAME: ${{ vars.PRODUCTION_REBUILD_ROCKET_ACCOUNT_NAME }}
          REBUILD_SELLPIA_FILE_SHA256: ${{ vars.PRODUCTION_REBUILD_SELLPIA_FILE_SHA256 }}
          REBUILD_SELLPIA_ROW_COUNT: ${{ vars.PRODUCTION_REBUILD_SELLPIA_ROW_COUNT }}
          REBUILD_WING_FILE_SHA256: ${{ vars.PRODUCTION_REBUILD_WING_FILE_SHA256 }}
          REBUILD_WING_ROW_COUNT: ${{ vars.PRODUCTION_REBUILD_WING_ROW_COUNT }}
          REBUILD_BOOTSTRAP_PREFLIGHT_PATH: ${{ runner.temp }}/bootstrap-preflight.json
        run: npm run inventory:rebuild -- bootstrap --origin-run-id "${{ github.run_id }}"

      - name: Run post-schema data migrations
        if: inputs.destructive_reset == ''
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DATA_MIGRATION_TARGET: production
          DATA_MIGRATION_CONFIRM: APPLY_DATA_MIGRATIONS
          DATA_MIGRATION_PRODUCTION_CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set production secret PRODUCTION_DATABASE_URL}"
          npm run data:migrate -- up --phase post-schema

      - name: Render production runtime env files
        env:
          API_ENV_FILE: .env.production.api
          WEB_ENV_FILE: .env.production.web
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
          SUPABASE_URL: ${{ vars.PRODUCTION_SUPABASE_URL || vars.PRODUCTION_NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          CORS_ORIGINS: ${{ vars.PRODUCTION_CORS_ORIGINS || vars.PRODUCTION_URL }}
          S3_REGION: ${{ vars.PRODUCTION_S3_REGION }}
          S3_BUCKET: ${{ vars.PRODUCTION_S3_BUCKET }}
          S3_ENDPOINT: ${{ vars.PRODUCTION_S3_ENDPOINT }}
          S3_PUBLIC_URL: ${{ vars.PRODUCTION_S3_PUBLIC_URL }}
          S3_ACCESS_KEY: ${{ secrets.PRODUCTION_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.PRODUCTION_S3_SECRET_KEY }}
          CHANNEL_CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.PRODUCTION_CHANNEL_CREDENTIALS_ENCRYPTION_KEY }}
          NAVER_API_HUB_CLIENT_ID: ${{ secrets.PRODUCTION_NAVER_API_HUB_CLIENT_ID }}
          NAVER_API_HUB_CLIENT_SECRET: ${{ secrets.PRODUCTION_NAVER_API_HUB_CLIENT_SECRET }}
          NAVER_API_HUB_BASE_URL: ${{ vars.PRODUCTION_NAVER_API_HUB_BASE_URL }}
          NAVER_SEARCHAD_API_KEY: ${{ secrets.PRODUCTION_NAVER_SEARCHAD_API_KEY }}
          NAVER_SEARCHAD_SECRET_KEY: ${{ secrets.PRODUCTION_NAVER_SEARCHAD_SECRET_KEY }}
          NAVER_SEARCHAD_CUSTOMER_ID: ${{ secrets.PRODUCTION_NAVER_SEARCHAD_CUSTOMER_ID }}
          NAVER_SEARCHAD_BASE_URL: ${{ vars.PRODUCTION_NAVER_SEARCHAD_BASE_URL }}
          DIRECT_1688_MTOP_BASE_URL: ${{ vars.PRODUCTION_DIRECT_1688_MTOP_BASE_URL }}
          TMAPI_TOKEN: ${{ secrets.PRODUCTION_TMAPI_TOKEN }}
          TMAPI_BASE_URL: ${{ vars.PRODUCTION_TMAPI_BASE_URL }}
          SOURCING_PLAYWRIGHT_CDP_ENDPOINT: ${{ vars.PRODUCTION_SOURCING_PLAYWRIGHT_CDP_ENDPOINT }}
          TAOBAO_TOP_APP_KEY: ${{ secrets.PRODUCTION_TAOBAO_TOP_APP_KEY }}
          TAOBAO_TOP_APP_SECRET: ${{ secrets.PRODUCTION_TAOBAO_TOP_APP_SECRET }}
          TAOBAO_TOP_BASE_URL: ${{ vars.PRODUCTION_TAOBAO_TOP_BASE_URL }}
          TAOBAO_TOP_TIMEOUT_MS: ${{ vars.PRODUCTION_TAOBAO_TOP_TIMEOUT_MS }}
          GEMINI_API_KEY: ${{ secrets.PRODUCTION_GEMINI_API_KEY }}
          AI_TEXT_MODEL: ${{ vars.PRODUCTION_AI_TEXT_MODEL }}
          AI_IMAGE_MODEL: ${{ vars.PRODUCTION_AI_IMAGE_MODEL }}
          AI_IMAGE_ANALYSIS_MODEL: ${{ vars.PRODUCTION_AI_IMAGE_ANALYSIS_MODEL }}
          AI_IMAGE_ANALYSIS_VERIFY_MODEL: ${{ vars.PRODUCTION_AI_IMAGE_ANALYSIS_VERIFY_MODEL }}
          AGENT_RUNTIME_WORKER_ENABLED: ${{ vars.PRODUCTION_AGENT_RUNTIME_WORKER_ENABLED }}
          AGENT_DEFAULT_MODEL: ${{ vars.PRODUCTION_AGENT_DEFAULT_MODEL }}
          NEXT_PUBLIC_API_URL:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.PRODUCTION_NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.PRODUCTION_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: bash deploy/staging/render-runtime-env.sh

      - name: Prepare SSH
        env:
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${PRODUCTION_SSH_KEY:?Set production secret PRODUCTION_SSH_KEY}"
          : "${PRODUCTION_SSH_KNOWN_HOSTS:?Set production secret PRODUCTION_SSH_KNOWN_HOSTS}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PRODUCTION_SSH_KEY" > ~/.ssh/kiditem-production
          chmod 600 ~/.ssh/kiditem-production
          printf '%s\n' "$PRODUCTION_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Sync production compose assets
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
          PRODUCTION_REMOTE_DIR: ${{ vars.PRODUCTION_REMOTE_DIR }}
        run: |
          set -euo pipefail
          : "${PRODUCTION_HOST:?Set production variable PRODUCTION_HOST}"
          PRODUCTION_USER="${PRODUCTION_USER:-ubuntu}"
          PRODUCTION_REMOTE_DIR="${PRODUCTION_REMOTE_DIR:-/opt/kiditem}"
          case "$PRODUCTION_USER" in (*[!A-Za-z0-9_.-]*|'') echo "Invalid PRODUCTION_USER" >&2; exit 2 ;; esac
          case "$PRODUCTION_REMOTE_DIR" in (/*) ;; (*) echo "PRODUCTION_REMOTE_DIR must be absolute" >&2; exit 2 ;; esac
          case "$PRODUCTION_REMOTE_DIR" in (*[!A-Za-z0-9_./-]*) echo "Invalid PRODUCTION_REMOTE_DIR" >&2; exit 2 ;; esac
          target="${PRODUCTION_USER}@${PRODUCTION_HOST}"
          remote_dir_q="$(printf '%q' "$PRODUCTION_REMOTE_DIR")"
          tar -czf - VERSION docker-compose.production.yml .env.production.api .env.production.web deploy/production/nginx.conf deploy/production/remote-deploy.sh deploy/staging/remote-deploy.sh \
            | ssh -i ~/.ssh/kiditem-production "$target" \
                "mkdir -p ${remote_dir_q} && tar -xzf - -C ${remote_dir_q} && chmod +x ${remote_dir_q}/deploy/production/remote-deploy.sh ${remote_dir_q}/deploy/staging/remote-deploy.sh"

      - name: Deploy images on production host
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
          PRODUCTION_REMOTE_DIR: ${{ vars.PRODUCTION_REMOTE_DIR }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KIDITEM_API_IMAGE: ${{ needs.build_api.outputs.image_ref }}
          KIDITEM_WEB_IMAGE: ${{ needs.build_web.outputs.image_ref }}
          KIDITEM_API_IMAGE_TAG: ${{ needs.prepare.outputs.api_image_tag }}
          KIDITEM_WEB_IMAGE_TAG: ${{ needs.prepare.outputs.web_image_tag }}
          API_IMAGE_DIGEST: ${{ needs.build_api.outputs.digest }}
          WEB_IMAGE_DIGEST: ${{ needs.build_web.outputs.digest }}
          GIT_SHA: ${{ needs.prepare.outputs.git_sha }}
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALLOW_PRODUCTION_DOWNTIME_FOR_SPACE: ${{ inputs.allow_downtime_for_space && '1' || '0' }}
        run: |
          set -euo pipefail
          : "${PRODUCTION_HOST:?Set production variable PRODUCTION_HOST}"
          PRODUCTION_USER="${PRODUCTION_USER:-ubuntu}"
          PRODUCTION_REMOTE_DIR="${PRODUCTION_REMOTE_DIR:-/opt/kiditem}"
          target="${PRODUCTION_USER}@${PRODUCTION_HOST}"
          q() { printf '%q' "$1"; }
          # shellcheck disable=SC2087
          ssh -i ~/.ssh/kiditem-production "$target" "cd $(q "$PRODUCTION_REMOTE_DIR") && bash -s" <<REMOTE
          set -euo pipefail
          export GHCR_ACTOR=$(q "$GHCR_ACTOR")
          export GHCR_TOKEN=$(q "$GHCR_TOKEN")
          export KIDITEM_API_IMAGE=$(q "$KIDITEM_API_IMAGE")
          export KIDITEM_WEB_IMAGE=$(q "$KIDITEM_WEB_IMAGE")
          export KIDITEM_API_IMAGE_TAG=$(q "$KIDITEM_API_IMAGE_TAG")
          export KIDITEM_WEB_IMAGE_TAG=$(q "$KIDITEM_WEB_IMAGE_TAG")
          export API_IMAGE_DIGEST=$(q "$API_IMAGE_DIGEST")
          export WEB_IMAGE_DIGEST=$(q "$WEB_IMAGE_DIGEST")
          export GIT_SHA=$(q "$GIT_SHA")
          export APP_VERSION=$(q "$APP_VERSION")
          export DEPLOY_OPERATION=deploy
          export PUBLIC_URL=$(q "${PRODUCTION_URL:-}")
          export GITHUB_ACTOR=$(q "$GITHUB_ACTOR")
          export GITHUB_REPOSITORY=$(q "$GITHUB_REPOSITORY")
          export GITHUB_RUN_ID=$(q "$GITHUB_RUN_ID")
          export GITHUB_RUN_ATTEMPT=$(q "$GITHUB_RUN_ATTEMPT")
          export GITHUB_RUN_URL=$(q "$GITHUB_RUN_URL")
          export ALLOW_STAGING_DOWNTIME_FOR_SPACE=$(q "$ALLOW_PRODUCTION_DOWNTIME_FOR_SPACE")
          ./deploy/production/remote-deploy.sh deploy
          REMOTE

      - name: Verify public production URL
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          set -euo pipefail
          : "${PRODUCTION_URL:?Set production variable PRODUCTION_URL}"
          PRODUCTION_URL="${PRODUCTION_URL%/}"
          for _ in $(seq 1 12); do
            login_code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "$PRODUCTION_URL/login" || true)"
            auth_code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "$PRODUCTION_URL/api/auth/me" || true)"
            if [[ "$login_code" == "200" && ( "$auth_code" == "401" || "$auth_code" == "403" ) ]]; then
              echo "Public production smoke checks passed: $PRODUCTION_URL/login=200, $PRODUCTION_URL/api/auth/me=$auth_code"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Public production URL did not become healthy: $PRODUCTION_URL" >&2
          exit 1

      - name: Verify production data migration status
        if: inputs.destructive_reset == ''
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set production secret PRODUCTION_DATABASE_URL}"
          npm run data:migrate -- status

      - name: Query final production status
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
          PRODUCTION_REMOTE_DIR: ${{ vars.PRODUCTION_REMOTE_DIR }}
        run: |
          set -euo pipefail
          : "${PRODUCTION_HOST:?Set production variable PRODUCTION_HOST}"
          PRODUCTION_USER="${PRODUCTION_USER:-ubuntu}"
          PRODUCTION_REMOTE_DIR="${PRODUCTION_REMOTE_DIR:-/opt/kiditem}"
          q() { printf '%q' "$1"; }
          ssh -i ~/.ssh/kiditem-production "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            "cd $(q "$PRODUCTION_REMOTE_DIR") && ./deploy/production/remote-deploy.sh status"

      - name: Resume previous production runtime after pre-reset failure
        if: failure() && inputs.destructive_reset != '' && (steps.quiesce.outcome == 'success' || steps.quiesce.outcome == 'failure') && steps.reset_boundary.outputs.started != 'true'
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
          PRODUCTION_REMOTE_DIR: ${{ vars.PRODUCTION_REMOTE_DIR }}
        run: |
          set -euo pipefail
          PRODUCTION_USER="${PRODUCTION_USER:-ubuntu}"
          PRODUCTION_REMOTE_DIR="${PRODUCTION_REMOTE_DIR:-/opt/kiditem}"
          q() { printf '%q' "$1"; }
          ssh -i ~/.ssh/kiditem-production "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            "cd $(q "$PRODUCTION_REMOTE_DIR") && ./deploy/production/remote-deploy.sh resume"

      - name: Write production deployment summary
        if: always()
        env:
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
          GIT_SHA: ${{ needs.prepare.outputs.git_sha }}
          API_IMAGE: ${{ needs.build_api.outputs.image_ref }}
          WEB_IMAGE: ${{ needs.build_web.outputs.image_ref }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          {
            echo "## Production deploy"
            echo
            echo "- Version: \`${APP_VERSION}\`"
            echo "- Git SHA: \`${GIT_SHA}\`"
            echo "- API image: \`${API_IMAGE}\`"
            echo "- Web image: \`${WEB_IMAGE}\`"
            echo "- Provenance fields: \`apiImageRevision\`, \`webImageRevision\` (both guarded to Git SHA)"
            echo "- URL: ${PRODUCTION_URL:-unset}"
            echo "- Runbook: \`docs/runbooks/production-deploy.md\`"
          } >> "$GITHUB_STEP_SUMMARY"

  finalize_rebuild:
    name: Finalize production authoritative rebuild
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'finalize-rebuild'
    needs: identity_guard
    runs-on: ubuntu-latest
    environment: production
    permissions:
      actions: read
      contents: read
    steps:
      - name: Resolve originating rebuild run
        id: origin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REBUILD_RUN_ID: ${{ inputs.rebuild_run_id }}
        run: |
          set -euo pipefail
          case "$REBUILD_RUN_ID" in
            ''|*[!0-9]*) echo "rebuild_run_id must be the originating numeric workflow run ID" >&2; exit 2 ;;
          esac
          run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${REBUILD_RUN_ID}")"
          workflow_path="$(jq -r '.path' <<<"$run_json")"
          event="$(jq -r '.event' <<<"$run_json")"
          conclusion="$(jq -r '.conclusion' <<<"$run_json")"
          head_sha="$(jq -r '.head_sha' <<<"$run_json")"
          [[ "$workflow_path" == ".github/workflows/production-deploy.yml" ]] || { echo "origin run belongs to $workflow_path" >&2; exit 2; }
          [[ "$event" == "workflow_dispatch" && "$conclusion" == "success" ]] || { echo "origin run must be a successful workflow_dispatch" >&2; exit 2; }
          [[ "$head_sha" =~ ^[0-9a-f]{40}$ ]] || { echo "origin run has invalid head SHA" >&2; exit 2; }
          jobs_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${REBUILD_RUN_ID}/jobs?per_page=100")"
          deploy_jobs="$(jq '[.jobs[] | select(.name == "Deploy to production" and .conclusion == "success")] | length' <<<"$jobs_json")"
          [[ "$deploy_jobs" == "1" ]] || { echo "origin run did not complete exactly one production deploy job" >&2; exit 2; }
          artifacts_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${REBUILD_RUN_ID}/artifacts?per_page=100")"
          artifact_name="authoritative-rebuild-${REBUILD_RUN_ID}-production"
          artifacts="$(jq --arg name "$artifact_name" '[.artifacts[] | select(.name == $name and .expired == false)] | length' <<<"$artifacts_json")"
          [[ "$artifacts" == "1" ]] || { echo "origin run does not expose exactly one live production rebuild artifact" >&2; exit 2; }
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout originating rebuild SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.origin.outputs.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install finalization dependencies
        run: npm ci --ignore-scripts --fetch-timeout=600000 --fetch-retries=5 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000 --no-audit --no-fund

      - name: Generate Prisma client for finalization
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: npx prisma generate

      - name: Verify protected production database identity for finalization
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DATABASE_URL_SHA256: ${{ secrets.PRODUCTION_DATABASE_URL_SHA256 }}
          EXPECTED_DATABASE_NAME: ${{ vars.PRODUCTION_DATABASE_NAME }}
        run: |
          set -euo pipefail
          : "${DATABASE_URL:?Set production database URL secret}"
          : "${DATABASE_URL_SHA256:?Set approved production URL SHA-256 secret}"
          : "${EXPECTED_DATABASE_NAME:?Set production expected database-name variable}"
          [[ "$(printf '%s' "$DATABASE_URL" | sha256sum | cut -d' ' -f1)" == "$DATABASE_URL_SHA256" ]] || { echo "database URL fingerprint mismatch" >&2; exit 2; }
          [[ "$(DATABASE_URL="$DATABASE_URL" node -e 'const u=new URL(process.env.DATABASE_URL); process.stdout.write(decodeURIComponent(u.pathname.replace(/^\\//,"")))')" == "$EXPECTED_DATABASE_NAME" ]] || { echo "database URL pathname mismatch" >&2; exit 2; }
          [[ "$(psql -X "$DATABASE_URL" -v ON_ERROR_STOP=1 -Atqc 'SELECT current_database()')" == "$EXPECTED_DATABASE_NAME" ]] || { echo "live current_database() mismatch" >&2; exit 2; }

      - name: Validate production finalization binding
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DEPLOYMENT_TARGET: ${{ inputs.deployment_target }}
          REBUILD_TARGET: ${{ inputs.deployment_target }}
          GITHUB_ENVIRONMENT: production
          DESTRUCTIVE_RESET: ${{ inputs.destructive_reset }}
          EXPECTED_RESET_CONFIRMATION: RESET_PRODUCTION_DATA
          REBUILD_RUN_ID: ${{ inputs.rebuild_run_id }}
          REBUILD_EXPECTED_DATABASE_HOST: ${{ secrets.PRODUCTION_REBUILD_EXPECTED_DATABASE_HOST }}
          REBUILD_EXPECTED_SUPABASE_PROJECT_REF: ${{ secrets.PRODUCTION_REBUILD_EXPECTED_SUPABASE_PROJECT_REF }}
          REBUILD_ORGANIZATION_ID: ${{ vars.PRODUCTION_REBUILD_ORGANIZATION_ID }}
          REBUILD_ORGANIZATION_SLUG: ${{ vars.PRODUCTION_REBUILD_ORGANIZATION_SLUG }}
          REBUILD_COUPANG_ACCOUNT_ID: ${{ vars.PRODUCTION_REBUILD_COUPANG_ACCOUNT_ID }}
          REBUILD_COUPANG_EXTERNAL_ACCOUNT_ID: ${{ secrets.PRODUCTION_REBUILD_COUPANG_EXTERNAL_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          case "$REBUILD_RUN_ID" in
            ''|*[!0-9]*) echo "rebuild_run_id must be the originating numeric workflow run ID" >&2; exit 2 ;;
          esac
          npm run inventory:rebuild -- guard

      - name: Download private rebuild bundle from originating run
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: authoritative-rebuild-${{ inputs.rebuild_run_id }}-production
          path: ${{ runner.temp }}/authoritative-rebuild
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.rebuild_run_id }}

      - name: Replay approved Coupang snapshots through authenticated endpoint
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DEPLOYMENT_TARGET: ${{ inputs.deployment_target }}
          REBUILD_TARGET: ${{ inputs.deployment_target }}
          REBUILD_DEPLOYED_SHA: ${{ steps.origin.outputs.head_sha }}
          GITHUB_ENVIRONMENT: production
          DESTRUCTIVE_RESET: ${{ inputs.destructive_reset }}
          EXPECTED_RESET_CONFIRMATION: RESET_PRODUCTION_DATA
          REBUILD_ORGANIZATION_ID: ${{ vars.PRODUCTION_REBUILD_ORGANIZATION_ID }}
          REBUILD_COUPANG_ACCOUNT_ID: ${{ vars.PRODUCTION_REBUILD_COUPANG_ACCOUNT_ID }}
          REBUILD_SELLPIA_FILE_SHA256: ${{ vars.PRODUCTION_REBUILD_SELLPIA_FILE_SHA256 }}
          REBUILD_SELLPIA_ROW_COUNT: ${{ vars.PRODUCTION_REBUILD_SELLPIA_ROW_COUNT }}
          REBUILD_WING_FILE_SHA256: ${{ vars.PRODUCTION_REBUILD_WING_FILE_SHA256 }}
          REBUILD_WING_ROW_COUNT: ${{ vars.PRODUCTION_REBUILD_WING_ROW_COUNT }}
          REBUILD_USER_ID: ${{ vars.PRODUCTION_REBUILD_USER_ID }}
          REBUILD_USER_EMAIL: ${{ secrets.PRODUCTION_REBUILD_USER_EMAIL }}
          REBUILD_API_URL: ${{ vars.PRODUCTION_REBUILD_EXPECTED_API_ORIGIN }}
          REBUILD_EXPECTED_API_ORIGIN: ${{ vars.PRODUCTION_REBUILD_EXPECTED_API_ORIGIN }}
          SUPABASE_URL: ${{ vars.PRODUCTION_SUPABASE_URL || vars.PRODUCTION_NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          REBUILD_EXPECTED_SUPABASE_PROJECT_REF: ${{ secrets.PRODUCTION_REBUILD_EXPECTED_SUPABASE_PROJECT_REF }}
          SUPABASE_SECRET_KEY: ${{ secrets.PRODUCTION_SUPABASE_SECRET_KEY }}
          REBUILD_BUNDLE_PATH: ${{ runner.temp }}/authoritative-rebuild/authoritative-rebuild.json
        run: npm run inventory:rebuild -- replay-coupang --origin-run-id "${{ inputs.rebuild_run_id }}"

      - name: Verify imported facts and mark production ready
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DEPLOYMENT_TARGET: ${{ inputs.deployment_target }}
          REBUILD_TARGET: ${{ inputs.deployment_target }}
          REBUILD_DEPLOYED_SHA: ${{ steps.origin.outputs.head_sha }}
          GITHUB_ENVIRONMENT: production
          DESTRUCTIVE_RESET: ${{ inputs.destructive_reset }}
          EXPECTED_RESET_CONFIRMATION: RESET_PRODUCTION_DATA
          REBUILD_ORGANIZATION_ID: ${{ vars.PRODUCTION_REBUILD_ORGANIZATION_ID }}
          REBUILD_COUPANG_ACCOUNT_ID: ${{ vars.PRODUCTION_REBUILD_COUPANG_ACCOUNT_ID }}
          REBUILD_SELLPIA_FILE_SHA256: ${{ vars.PRODUCTION_REBUILD_SELLPIA_FILE_SHA256 }}
          REBUILD_SELLPIA_ROW_COUNT: ${{ vars.PRODUCTION_REBUILD_SELLPIA_ROW_COUNT }}
          REBUILD_WING_FILE_SHA256: ${{ vars.PRODUCTION_REBUILD_WING_FILE_SHA256 }}
          REBUILD_WING_ROW_COUNT: ${{ vars.PRODUCTION_REBUILD_WING_ROW_COUNT }}
          REBUILD_EXPECTED_ACTIVE_MASTERS: ${{ vars.PRODUCTION_REBUILD_EXPECTED_ACTIVE_MASTERS }}
          REBUILD_EXPECTED_LISTINGS: ${{ vars.PRODUCTION_REBUILD_EXPECTED_LISTINGS }}
          REBUILD_EXPECTED_CHANNEL_SKUS: ${{ vars.PRODUCTION_REBUILD_EXPECTED_CHANNEL_SKUS }}
          REBUILD_BUNDLE_PATH: ${{ runner.temp }}/authoritative-rebuild/authoritative-rebuild.json
        run: npm run inventory:rebuild -- verify-ready --origin-run-id "${{ inputs.rebuild_run_id }}"

      - name: Write production rebuild finalization summary
        if: always()
        env:
          REBUILD_RUN_ID: ${{ inputs.rebuild_run_id }}
        run: |
          {
            echo "## Production authoritative rebuild finalization"
            echo
            echo "- Originating run: \`${REBUILD_RUN_ID}\`"
            echo "- Result: \`${{ job.status }}\`"
            echo "- Runbook: \`docs/runbooks/production-deploy.md\`"
          } >> "$GITHUB_STEP_SUMMARY"

  rollback:
    name: Roll back production
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'rollback'
    needs: identity_guard
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.identity_guard.outputs.git_sha }}

      - name: Validate rollback confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          [[ "$CONFIRM" == "ROLLBACK_PRODUCTION" ]] || { echo "confirm must be ROLLBACK_PRODUCTION" >&2; exit 2; }
          : "${IMAGE_TAG:?image_tag input is required for rollback}"
          case "$IMAGE_TAG" in (*[!A-Za-z0-9_.-]*|production|production-candidate) echo "Use an immutable git SHA tag for rollback, not '$IMAGE_TAG'" >&2; exit 2 ;; esac

      - name: Render production runtime env files
        env:
          API_ENV_FILE: .env.production.api
          WEB_ENV_FILE: .env.production.web
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
          SUPABASE_URL: ${{ vars.PRODUCTION_SUPABASE_URL || vars.PRODUCTION_NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          CORS_ORIGINS: ${{ vars.PRODUCTION_CORS_ORIGINS || vars.PRODUCTION_URL }}
          S3_REGION: ${{ vars.PRODUCTION_S3_REGION }}
          S3_BUCKET: ${{ vars.PRODUCTION_S3_BUCKET }}
          S3_ENDPOINT: ${{ vars.PRODUCTION_S3_ENDPOINT }}
          S3_PUBLIC_URL: ${{ vars.PRODUCTION_S3_PUBLIC_URL }}
          S3_ACCESS_KEY: ${{ secrets.PRODUCTION_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.PRODUCTION_S3_SECRET_KEY }}
          CHANNEL_CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.PRODUCTION_CHANNEL_CREDENTIALS_ENCRYPTION_KEY }}
          GEMINI_API_KEY: ${{ secrets.PRODUCTION_GEMINI_API_KEY }}
          AI_TEXT_MODEL: ${{ vars.PRODUCTION_AI_TEXT_MODEL }}
          AI_IMAGE_MODEL: ${{ vars.PRODUCTION_AI_IMAGE_MODEL }}
          AI_IMAGE_ANALYSIS_MODEL: ${{ vars.PRODUCTION_AI_IMAGE_ANALYSIS_MODEL }}
          AI_IMAGE_ANALYSIS_VERIFY_MODEL: ${{ vars.PRODUCTION_AI_IMAGE_ANALYSIS_VERIFY_MODEL }}
          AGENT_RUNTIME_WORKER_ENABLED: ${{ vars.PRODUCTION_AGENT_RUNTIME_WORKER_ENABLED }}
          AGENT_DEFAULT_MODEL: ${{ vars.PRODUCTION_AGENT_DEFAULT_MODEL }}
          NEXT_PUBLIC_API_URL:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.PRODUCTION_NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.PRODUCTION_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: bash deploy/staging/render-runtime-env.sh

      - name: Prepare SSH
        env:
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${PRODUCTION_SSH_KEY:?Set production secret PRODUCTION_SSH_KEY}"
          : "${PRODUCTION_SSH_KNOWN_HOSTS:?Set production secret PRODUCTION_SSH_KNOWN_HOSTS}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PRODUCTION_SSH_KEY" > ~/.ssh/kiditem-production
          chmod 600 ~/.ssh/kiditem-production
          printf '%s\n' "$PRODUCTION_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Sync production compose assets
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
          PRODUCTION_REMOTE_DIR: ${{ vars.PRODUCTION_REMOTE_DIR }}
        run: |
          set -euo pipefail
          : "${PRODUCTION_HOST:?Set production variable PRODUCTION_HOST}"
          PRODUCTION_USER="${PRODUCTION_USER:-ubuntu}"
          PRODUCTION_REMOTE_DIR="${PRODUCTION_REMOTE_DIR:-/opt/kiditem}"
          target="${PRODUCTION_USER}@${PRODUCTION_HOST}"
          remote_dir_q="$(printf '%q' "$PRODUCTION_REMOTE_DIR")"
          tar -czf - VERSION docker-compose.production.yml .env.production.api .env.production.web deploy/production/nginx.conf deploy/production/remote-deploy.sh deploy/staging/remote-deploy.sh \
            | ssh -i ~/.ssh/kiditem-production "$target" \
                "mkdir -p ${remote_dir_q} && tar -xzf - -C ${remote_dir_q} && chmod +x ${remote_dir_q}/deploy/production/remote-deploy.sh ${remote_dir_q}/deploy/staging/remote-deploy.sh"

      - name: Deploy selected rollback tag
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
          PRODUCTION_REMOTE_DIR: ${{ vars.PRODUCTION_REMOTE_DIR }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          : "${PRODUCTION_HOST:?Set production variable PRODUCTION_HOST}"
          PRODUCTION_USER="${PRODUCTION_USER:-ubuntu}"
          PRODUCTION_REMOTE_DIR="${PRODUCTION_REMOTE_DIR:-/opt/kiditem}"
          API_IMAGE="${API_IMAGE_BASE}:${IMAGE_TAG}"
          WEB_IMAGE="${WEB_IMAGE_BASE}:${IMAGE_TAG}"
          target="${PRODUCTION_USER}@${PRODUCTION_HOST}"
          q() { printf '%q' "$1"; }
          # shellcheck disable=SC2087
          ssh -i ~/.ssh/kiditem-production "$target" "cd $(q "$PRODUCTION_REMOTE_DIR") && bash -s" <<REMOTE
          set -euo pipefail
          export GHCR_ACTOR=$(q "$GHCR_ACTOR")
          export GHCR_TOKEN=$(q "$GHCR_TOKEN")
          export KIDITEM_API_IMAGE=$(q "$API_IMAGE")
          export KIDITEM_WEB_IMAGE=$(q "$WEB_IMAGE")
          export KIDITEM_API_IMAGE_TAG=$(q "$API_IMAGE")
          export KIDITEM_WEB_IMAGE_TAG=$(q "$WEB_IMAGE")
          export GIT_SHA=$(q "$IMAGE_TAG")
          export DEPLOY_OPERATION=rollback
          export PUBLIC_URL=$(q "${PRODUCTION_URL:-}")
          export GITHUB_ACTOR=$(q "$GITHUB_ACTOR")
          export GITHUB_REPOSITORY=$(q "$GITHUB_REPOSITORY")
          export GITHUB_RUN_ID=$(q "$GITHUB_RUN_ID")
          export GITHUB_RUN_ATTEMPT=$(q "$GITHUB_RUN_ATTEMPT")
          export GITHUB_RUN_URL=$(q "$GITHUB_RUN_URL")
          ./deploy/production/remote-deploy.sh deploy
          REMOTE

      - name: Write production rollback summary
        if: always()
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          {
            echo "## Production rollback"
            echo
            echo "- Image tag: \`${IMAGE_TAG}\`"
            echo "- URL: ${PRODUCTION_URL:-unset}"
            echo "- Runbook: \`docs/runbooks/production-deploy.md\`"
          } >> "$GITHUB_STEP_SUMMARY"

  status:
    name: Show production status
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'status'
    needs: identity_guard
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.identity_guard.outputs.git_sha }}

      - name: Prepare SSH
        env:
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${PRODUCTION_SSH_KEY:?Set production secret PRODUCTION_SSH_KEY}"
          : "${PRODUCTION_SSH_KNOWN_HOSTS:?Set production secret PRODUCTION_SSH_KNOWN_HOSTS}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PRODUCTION_SSH_KEY" > ~/.ssh/kiditem-production
          chmod 600 ~/.ssh/kiditem-production
          printf '%s\n' "$PRODUCTION_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Sync production status script
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
          PRODUCTION_REMOTE_DIR: ${{ vars.PRODUCTION_REMOTE_DIR }}
        run: |
          set -euo pipefail
          : "${PRODUCTION_HOST:?Set production variable PRODUCTION_HOST}"
          PRODUCTION_USER="${PRODUCTION_USER:-ubuntu}"
          PRODUCTION_REMOTE_DIR="${PRODUCTION_REMOTE_DIR:-/opt/kiditem}"
          target="${PRODUCTION_USER}@${PRODUCTION_HOST}"
          remote_dir_q="$(printf '%q' "$PRODUCTION_REMOTE_DIR")"
          tar -czf - VERSION docker-compose.production.yml deploy/production/nginx.conf deploy/production/remote-deploy.sh deploy/staging/remote-deploy.sh \
            | ssh -i ~/.ssh/kiditem-production "$target" \
                "mkdir -p ${remote_dir_q} && tar -xzf - -C ${remote_dir_q} && chmod +x ${remote_dir_q}/deploy/production/remote-deploy.sh ${remote_dir_q}/deploy/staging/remote-deploy.sh"

      - name: Query production status
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
          PRODUCTION_REMOTE_DIR: ${{ vars.PRODUCTION_REMOTE_DIR }}
        run: |
          set -euo pipefail
          : "${PRODUCTION_HOST:?Set production variable PRODUCTION_HOST}"
          PRODUCTION_USER="${PRODUCTION_USER:-ubuntu}"
          PRODUCTION_REMOTE_DIR="${PRODUCTION_REMOTE_DIR:-/opt/kiditem}"
          q() { printf '%q' "$1"; }
          ssh -i ~/.ssh/kiditem-production "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            "cd $(q "$PRODUCTION_REMOTE_DIR") && ./deploy/production/remote-deploy.sh status"

      - name: Write production status summary
        if: always()
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          {
            echo "## Production status"
            echo
            echo "- URL: ${PRODUCTION_URL:-unset}"
            echo "- Runbook: \`docs/runbooks/production-deploy.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
