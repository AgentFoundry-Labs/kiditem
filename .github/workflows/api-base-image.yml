name: API Runtime Base Image

on:
  workflow_dispatch:
  schedule:
    - cron: "17 19 1 * *"
  push:
    branches:
      - main
    paths:
      - deploy/docker/api-base.Dockerfile
      - .github/workflows/api-base-image.yml

concurrency:
  group: api-runtime-base-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_BASE_IMAGE: ghcr.io/agentfoundry-labs/kiditem-api-base

jobs:
  build:
    name: Build and push API runtime base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compute image tags
        id: image_tags
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          {
            echo "tags<<EOF"
            echo "${API_BASE_IMAGE}:node22-chromium-${short_sha}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./deploy/docker/api-base.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=KidItem API Runtime Base
            org.opencontainers.image.description=Node runtime with system Chromium for server-side detail page rasterization
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=api-runtime-base
          cache-to: type=gha,mode=max,scope=api-runtime-base
