name: kiditem-staging

services:
  api:
    container_name: kiditem-staging-api
    image: ${KIDITEM_API_IMAGE:?KIDITEM_API_IMAGE is required}
    env_file:
      - path: ./.env.staging.api
        required: false
    environment:
      NODE_ENV: production
      PORT: 4000
    expose:
      - "4000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/api/auth/me').then((r)=>process.exit(r.status===401||r.status===403?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    container_name: kiditem-staging-web
    image: ${KIDITEM_WEB_IMAGE:?KIDITEM_WEB_IMAGE is required}
    env_file:
      - path: ./.env.staging.web
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    container_name: kiditem-staging-nginx
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./deploy/staging/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/login >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
