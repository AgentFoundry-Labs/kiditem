name: kiditem-staging

x-api-service: &api-service
  env_file:
    - path: ./.env.staging.api
      required: false
  environment:
    NODE_ENV: production
    PORT: 4000
    AGENT_RUNTIME_WORKER_ENABLED: "0"
  expose:
    - "4000"
  restart: unless-stopped
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "node -e \"fetch('http://127.0.0.1:4000/api/auth/me').then((r)=>process.exit(r.status===401||r.status===403?0:1)).catch(()=>process.exit(1))\"",
      ]
    interval: 30s
    timeout: 5s
    retries: 5
    start_period: 30s

x-web-service: &web-service
  env_file:
    - path: ./.env.staging.web
      required: false
  environment:
    NODE_ENV: production
    PORT: 3000
    HOSTNAME: 0.0.0.0
  expose:
    - "3000"
  restart: unless-stopped
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "node -e \"fetch('http://127.0.0.1:3000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
      ]
    interval: 30s
    timeout: 5s
    retries: 5
    start_period: 30s

x-worker-service: &worker-service
  env_file:
    - path: ./.env.staging.api
      required: false
  environment:
    NODE_ENV: production
    AGENT_RUNTIME_WORKER_ENABLED: "1"
  command: ["node", "dist/worker.js"]
  restart: unless-stopped

services:
  sourcing-chrome:
    container_name: kiditem-staging-sourcing-chrome
    image: ghcr.io/linuxserver/chromium:version-b0ddd401@sha256:47fc8bb18cdb0844199a16e1e14b3b38ba97f6ad1659895c243ba5f2384aad1e
    env_file:
      - path: ./.env.staging.browser
        required: false
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Asia/Seoul
      START_DOCKER: "false"
      SELKIES_ENABLE_SHARING: "False"
      CHROME_CLI: >-
        --remote-debugging-port=9222
        --user-data-dir=/config/chromium-cdp-profile
        https://www.1688.com/
    expose:
      - "9223"
    networks:
      default:
        aliases:
          - sourcing-chrome.localhost
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - sourcing-chrome-profile:/config
    shm_size: "1gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9222/json/version >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s

  sourcing-cdp-proxy:
    container_name: kiditem-staging-sourcing-cdp-proxy
    image: docker.io/alpine/socat:1.8.0.3@sha256:beb4a68d9e4fe6b0f21ea774a0fde6c31f580dde6368939ed70100c5385b015e
    network_mode: "service:sourcing-chrome"
    depends_on:
      sourcing-chrome:
        condition: service_healthy
    command: ["TCP-LISTEN:9223,fork,reuseaddr", "TCP:127.0.0.1:9222"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9223/json/version >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  api-blue:
    <<: *api-service
    container_name: kiditem-staging-api-blue
    image: ${KIDITEM_BLUE_API_IMAGE:?KIDITEM_BLUE_API_IMAGE is required}

  web-blue:
    <<: *web-service
    container_name: kiditem-staging-web-blue
    image: ${KIDITEM_BLUE_WEB_IMAGE:?KIDITEM_BLUE_WEB_IMAGE is required}

  worker-blue:
    <<: *worker-service
    container_name: kiditem-staging-worker-blue
    image: ${KIDITEM_BLUE_API_IMAGE:?KIDITEM_BLUE_API_IMAGE is required}

  api-green:
    <<: *api-service
    container_name: kiditem-staging-api-green
    image: ${KIDITEM_GREEN_API_IMAGE:?KIDITEM_GREEN_API_IMAGE is required}

  web-green:
    <<: *web-service
    container_name: kiditem-staging-web-green
    image: ${KIDITEM_GREEN_WEB_IMAGE:?KIDITEM_GREEN_WEB_IMAGE is required}

  worker-green:
    <<: *worker-service
    container_name: kiditem-staging-worker-green
    image: ${KIDITEM_GREEN_API_IMAGE:?KIDITEM_GREEN_API_IMAGE is required}

  nginx:
    container_name: kiditem-staging-nginx
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./deployments/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/login >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  sourcing-chrome-profile:
    name: kiditem-staging-sourcing-chrome-profile
