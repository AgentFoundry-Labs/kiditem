<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      color: #0f172a;
    }

    /* ─── Header ─── */
    .header {
      background: #0f172a;
      color: white;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .header .version { font-size: 11px; color: #64748b; margin-top: 2px; }
    .badge {
      font-size: 11px;
      background: #22c55e;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
    }
    .badge.offline { background: #ef4444; }

    /* ─── Section ─── */
    .section {
      padding: 16px 20px;
      border-bottom: 1px solid #e2e8f0;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #94a3b8;
      margin-bottom: 12px;
    }

    /* ─── Status Grid ─── */
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .status-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
      transition: border-color 0.15s;
    }
    .status-card:hover { border-color: #cbd5e1; }
    .status-card .label {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .status-card .value {
      font-size: 14px;
      font-weight: 700;
      color: #0f172a;
    }
    .status-card .value.none { color: #cbd5e1; font-weight: 500; }
    .status-card .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot-green { background: #22c55e; }
    .dot-gray { background: #cbd5e1; }
    .dot-orange { background: #f59e0b; }

    /* ─── Buttons ─── */
    .actions { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
    }
    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
    .btn-purple { background: #7c3aed; color: white; }
    .btn-purple:hover { background: #6d28d9; box-shadow: 0 4px 12px rgba(124,58,237,0.3); }
    .btn-secondary { background: white; color: #475569; border: 1px solid #e2e8f0; }
    .btn-secondary:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ─── Sync Result ─── */
    .sync-result {
      margin: 0 20px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      display: none;
      animation: slideDown 0.2s ease-out;
    }
    .sync-result.success { display: block; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .sync-result.error { display: block; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

    /* ─── Footer ─── */
    .footer {
      padding: 16px 20px;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      line-height: 1.6;
    }
    .footer a { color: #3b82f6; text-decoration: none; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-icon">⚡</div>
      <div>
        <h1>KIDITEM OS</h1>
        <div class="version">쿠팡 셀러 도우미 v1.1</div>
      </div>
    </div>
    <span class="badge" id="connBadge">확인중...</span>
  </div>

  <!-- Status -->
  <div class="section">
    <div class="section-title">동기화 현황</div>
    <div class="status-grid">
      <div class="status-card">
        <div class="label">서버 연결</div>
        <div class="value" id="serverStatus">확인중...</div>
      </div>
      <div class="status-card">
        <div class="label">승인 액션</div>
        <div class="value" id="approvedActions"><span class="dot dot-gray"></span>-</div>
      </div>
      <div class="status-card">
        <div class="label">트래픽 동기화</div>
        <div class="value" id="trafficSync"><span class="dot dot-gray"></span>-</div>
      </div>
      <div class="status-card">
        <div class="label">아이템위너</div>
        <div class="value" id="winnerSync"><span class="dot dot-gray"></span>-</div>
      </div>
      <div class="status-card" style="grid-column: span 2;">
        <div class="label">광고 데이터</div>
        <div class="value" id="adsSync"><span class="dot dot-gray"></span>-</div>
      </div>
    </div>
  </div>

  <div id="syncResult" class="sync-result"></div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" id="btnSync">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
      현재 페이지 동기화
    </button>
    <button class="btn btn-purple" id="btnRunApproved">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12 5 5L20 7"/></svg>
      승인 액션 실행
    </button>
    <div class="btn-row">
      <button class="btn btn-secondary" id="btnRegister">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        연동 등록
      </button>
      <button class="btn btn-secondary" id="btnOpen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        대시보드 열기
      </button>
    </div>
  </div>

  <div class="footer">
    Wing 또는 광고센터 페이지에서 자동 수집됩니다<br>
    서버: <a href="http://localhost:3000" id="footerLink">localhost:3000</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
