<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, sans-serif; background: #f8fafc; }
    .header { background: #0f172a; color: white; padding: 16px; display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header .badge { font-size: 10px; background: #22c55e; padding: 2px 8px; border-radius: 10px; }
    .header .badge.offline { background: #ef4444; }
    .status { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; }
    .status-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
    .status-label { font-size: 12px; color: #64748b; }
    .status-value { font-size: 12px; font-weight: 600; color: #0f172a; }
    .status-value.none { color: #94a3b8; }
    .actions { padding: 12px 16px; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #e2e8f0; color: #475569; }
    .btn-secondary:hover { background: #cbd5e1; }
    .info { padding: 8px 16px 16px; font-size: 10px; color: #94a3b8; text-align: center; }
    .sync-result { padding: 8px 12px; margin: 0 16px 8px; border-radius: 6px; font-size: 11px; display: none; }
    .sync-result.success { display: block; background: #f0fdf4; color: #16a34a; }
    .sync-result.error { display: block; background: #fef2f2; color: #dc2626; }
  </style>
</head>
<body>
  <div class="header">
    <h1>KIDITEM</h1>
    <span class="badge" id="connBadge">확인중...</span>
  </div>

  <div class="status">
    <div class="status-row">
      <span class="status-label">서버 연결</span>
      <span class="status-value" id="serverStatus">확인중...</span>
    </div>
    <div class="status-row">
      <span class="status-label">아이템위너</span>
      <span class="status-value" id="winnerSync">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">광고 데이터</span>
      <span class="status-value" id="adsSync">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">승인 대기 액션</span>
      <span class="status-value" id="pendingActions">-</span>
    </div>
  </div>

  <div id="syncResult" class="sync-result"></div>

  <div class="actions">
    <button class="btn btn-primary" id="btnSync">현재 페이지 동기화</button>
    <button class="btn btn-secondary" id="btnExecute" style="background:#f59e0b;color:white;">승인된 액션 실행</button>
    <button class="btn btn-secondary" id="btnRegister" style="background:#7c3aed;color:white;">대시보드 연동 등록</button>
    <button class="btn btn-secondary" id="btnOpen">대시보드 열기</button>
  </div>

  <div class="info">
    Wing 또는 광고센터 페이지에서 자동 수집됩니다.<br>
    서버: localhost:4000
  </div>

  <script src="popup.js"></script>
</body>
</html>
