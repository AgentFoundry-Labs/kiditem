services:
  postgres:
    container_name: kiditem-postgres
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: kiditem
      POSTGRES_PASSWORD: kiditem
      POSTGRES_DB: kiditem
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-langfuse-db.sql:/docker-entrypoint-initdb.d/init-langfuse-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiditem"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    container_name: kiditem-server
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://kiditem:kiditem@postgres:5432/kiditem
    env_file:
      - apps/server/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  langfuse:
    container_name: kiditem-langfuse
    image: langfuse/langfuse:2
    ports:
      - "3100:3000"
    environment:
      DATABASE_URL: postgresql://kiditem:kiditem@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3100
      NEXTAUTH_SECRET: kiditem-langfuse-secret
      SALT: kiditem-langfuse-salt
      TELEMETRY_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
