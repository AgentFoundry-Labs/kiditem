services:
  postgres:
    container_name: kiditem-postgres
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: kiditem
      POSTGRES_PASSWORD: kiditem
      POSTGRES_DB: kiditem
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-langfuse-db.sql:/docker-entrypoint-initdb.d/init-langfuse-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiditem"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    container_name: kiditem-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"       # S3 API
      - "9001:9001"       # Web console (http://localhost:9001, minioadmin/minioadmin)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # 브라우저에서 MinIO로 직접 fetch할 수 있도록 CORS 허용
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    container_name: kiditem-minio-init
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/kiditem;
      mc anonymous set public local/kiditem;
      echo 'MinIO bucket kiditem ready (public read)';
      "
    restart: "no"

  # NestJS 서버는 로컬 실행 (npm run dev:server)
  # Claude Code CLI 스폰이 필요하므로 Docker에서 분리
  # server:
  #   container_name: kiditem-server
  #   build:
  #     context: .
  #     dockerfile: apps/server/Dockerfile
  #   ports:
  #     - "4000:4000"
  #   environment:
  #     DATABASE_URL: postgresql://kiditem:kiditem@postgres:5432/kiditem
  #   env_file:
  #     - apps/server/.env
  #   volumes:
  #     - product-data:/data
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: unless-stopped

  # Python agents도 Claude CLI 연동 시 로컬 실행 권장
  # agents:
  #   container_name: kiditem-agents
  #   build:
  #     context: ./agents
  #   environment:
  #     DATABASE_URL: postgresql://kiditem:kiditem@postgres:5432/kiditem
  #     PYTHONWARNINGS: ignore::UserWarning
  #   env_file:
  #     - agents/.env
  #   volumes:
  #     - product-data:/data
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: unless-stopped

volumes:
  pgdata:
  minio-data:
