services:
  postgres:
    container_name: kiditem-postgres
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: kiditem
      POSTGRES_PASSWORD: kiditem
      POSTGRES_DB: kiditem
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-langfuse-db.sql:/docker-entrypoint-initdb.d/init-langfuse-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiditem"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    container_name: kiditem-server
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://kiditem:kiditem@postgres:5432/kiditem
    env_file:
      - apps/server/.env
    volumes:
      - product-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  agents:
    container_name: kiditem-agents
    build:
      context: ./agents
    environment:
      DATABASE_URL: postgresql://kiditem:kiditem@postgres:5432/kiditem
      PYTHONWARNINGS: ignore::UserWarning
    env_file:
      - agents/.env
    volumes:
      - product-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  product-data:
