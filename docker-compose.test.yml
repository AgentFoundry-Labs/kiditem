#
# Integration test Postgres — 개발용 DB(5433)와 분리된 격리 환경.
# 사용:
#   npm run db:test:up       # 기동 (볼륨 없이 in-memory tmpfs)
#   npm run db:test:prepare  # schema push (DB 초기화)
#   npm run test:integration # 실제 real DB 기반 race/concurrency 테스트
#   npm run db:test:down     # 중지 + 정리
#
# 왜 별도 파일인가:
#   - dev DB(5433) 에 테스트 데이터 섞이지 않도록 격리
#   - tmpfs 볼륨으로 빠른 기동 + 종료 시 자동 소멸
#   - CI 환경에서 동일 compose 재사용 가능
#
services:
  postgres-test:
    container_name: kiditem-postgres-test
    image: postgres:17
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: kiditem_test
      POSTGRES_PASSWORD: kiditem_test
      POSTGRES_DB: kiditem_test
    # tmpfs: 볼륨 마운트 없음 → 컨테이너 중지 시 데이터 자동 소멸
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiditem_test"]
      interval: 1s
      timeout: 5s
      retries: 30
